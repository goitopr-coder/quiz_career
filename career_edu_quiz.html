<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>キャリア教育コーディネーター 試験対策クイズ</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0f1117;color:#e8eaf0;font-family:sans-serif;min-height:100vh;padding:0 0 60px;}
.header{background:#1a1d27;border-bottom:1px solid #2e3347;padding:14px 16px;text-align:center;}
.header h1{font-size:14px;font-weight:700;margin-bottom:2px;}
.header p{font-size:11px;color:#8890a8;}
.wrap{max-width:600px;margin:0 auto;padding:14px;}
.card{background:#1a1d27;border:1px solid #2e3347;border-radius:12px;padding:14px;margin-bottom:10px;}
.lbl{font-size:11px;color:#8890a8;display:block;margin-bottom:5px;font-weight:500;}
select{width:100%;background:#0f1117;border:1px solid #2e3347;border-radius:8px;color:#e8eaf0;font-size:14px;font-family:sans-serif;padding:9px 12px;outline:none;}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-top:5px;}
.ch{background:#232736;border:1px solid #2e3347;border-radius:8px;color:#8890a8;font-size:11px;font-family:sans-serif;padding:8px 10px;text-align:left;cursor:pointer;line-height:1.4;width:100%;}
.ch.on{background:rgba(79,142,247,0.15);border-color:#4f8ef7;color:#e8eaf0;}
.cn{font-size:10px;font-weight:700;color:#4f8ef7;display:block;margin-bottom:1px;}
.row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;}
.btn{display:block;width:100%;background:#4f8ef7;color:#fff;border:none;border-radius:10px;padding:14px;font-size:15px;font-weight:700;font-family:sans-serif;cursor:pointer;margin-bottom:10px;text-align:center;}
.btn.gray{background:#232736;border:1px solid #2e3347;color:#e8eaf0;font-size:13px;}
.err{background:rgba(247,95,110,0.1);border:1px solid rgba(247,95,110,0.3);border-radius:8px;padding:11px;font-size:13px;color:#f75f6e;margin-bottom:10px;display:none;}
.pw{background:#232736;border-radius:4px;height:4px;margin-bottom:12px;}
.pb{height:4px;background:#4f8ef7;border-radius:4px;}
.meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.cnt{font-size:11px;color:#8890a8;font-weight:700;}
.tag{font-size:10px;background:rgba(79,142,247,0.15);color:#4f8ef7;border:1px solid rgba(79,142,247,0.3);border-radius:20px;padding:2px 10px;}
.qtxt{font-size:15px;font-weight:600;line-height:1.7;margin-bottom:14px;}
.opt{background:#232736;border:1px solid #2e3347;border-radius:10px;padding:12px 13px;color:#e8eaf0;font-size:13px;font-family:sans-serif;cursor:pointer;text-align:left;width:100%;display:flex;gap:10px;margin-bottom:7px;line-height:1.5;}
.opt:disabled{cursor:default;}
.ol{font-weight:700;font-size:11px;color:#555f7a;min-width:14px;padding-top:1px;flex-shrink:0;}
.opt.C{background:rgba(56,211,159,0.12);border-color:#38d39f;}.opt.C .ol{color:#38d39f;}
.opt.W{background:rgba(247,95,110,0.1);border-color:#f75f6e;}.opt.W .ol{color:#f75f6e;}
.opt.R{border-color:#38d39f;}.opt.R .ol{color:#38d39f;}
.expl{background:rgba(240,180,41,0.07);border:1px solid rgba(240,180,41,0.25);border-radius:10px;padding:13px;margin-top:11px;display:none;}
.et{font-size:11px;font-weight:700;color:#f0b429;margin-bottom:5px;}
.eb{font-size:13px;line-height:1.7;color:#a0a8c0;}
.sc{text-align:center;padding:4px 0 14px;font-size:13px;color:#8890a8;}
.sc span{color:#4f8ef7;font-weight:700;font-size:18px;}
.rp{font-size:56px;font-weight:700;color:#4f8ef7;line-height:1;margin:6px 0 4px;text-align:center;}
.rl{font-size:12px;color:#8890a8;margin-bottom:14px;text-align:center;}
.rm{font-size:16px;font-weight:700;margin-bottom:5px;text-align:center;}
.rs{font-size:13px;color:#8890a8;margin-bottom:18px;text-align:center;}
.st{display:flex;justify-content:center;gap:24px;margin-bottom:18px;}
.sn{font-size:26px;font-weight:700;text-align:center;}
.sn.g{color:#38d39f;}.sn.r{color:#f75f6e;}
.rt{font-size:11px;font-weight:700;color:#8890a8;letter-spacing:0.1em;margin-bottom:8px;margin-top:14px;}
.ri{background:#0f1117;border-radius:8px;padding:10px 12px;margin-bottom:6px;border-left:3px solid #2e3347;}
.ri.c{border-left-color:#38d39f;}.ri.w{border-left-color:#f75f6e;}
.rq{font-size:13px;margin-bottom:4px;line-height:1.5;}
.ra{font-size:11px;color:#8890a8;}
.ra .ca{color:#38d39f;margin-right:8px;}.ra .wa{color:#f75f6e;margin-right:8px;}
#A{}#B{display:none;}#D{display:none;}
.sr{display:flex;gap:5px;margin-bottom:7px;}
.sb{flex:1;background:#232736;border:1px solid #2e3347;border-radius:6px;color:#8890a8;font-size:11px;font-family:sans-serif;padding:6px;cursor:pointer;}
</style>
</head>
<body>
<div class="header">
  <h1>キャリア教育コーディネーター 試験対策クイズ</h1>
  <p>全16章 228問収録</p>
</div>
<div class="wrap">

<div id="A">
  <div class="card">
    <span class="lbl">章を選択（複数可）</span>
    <div class="sr">
      <button class="sb" id="bA">すべて選択</button>
      <button class="sb" id="bN">すべて解除</button>
    </div>
    <div class="grid" id="cG"></div>
  </div>
  <div class="row">
    <div class="card">
      <span class="lbl">問題数</span>
      <select id="nQ">
        <option value="10">10問</option>
        <option value="20" selected>20問</option>
        <option value="30">30問</option>
        <option value="50">50問</option>
        <option value="0">全問</option>
      </select>
    </div>
    <div class="card">
      <span class="lbl">出題順</span>
      <select id="oR">
        <option value="random" selected>ランダム</option>
        <option value="chapter">章順</option>
      </select>
    </div>
  </div>
  <div class="err" id="eB"></div>
  <button class="btn" id="stB">クイズ開始</button>
</div>

<div id="B">
  <div class="pw"><div class="pb" id="pB"></div></div>
  <div class="sc">スコア: <span id="lS">0</span>/<span id="lT">0</span></div>
  <div class="card">
    <div class="meta">
      <span class="cnt" id="cT"></span>
      <span class="tag" id="cH"></span>
    </div>
    <div class="qtxt" id="qT"></div>
    <div id="oW"></div>
    <div class="expl" id="xB">
      <div class="et">解説</div>
      <div class="eb" id="xT"></div>
    </div>
  </div>
  <button class="btn" id="nB" style="display:none">次の問題 →</button>
</div>

<div id="D">
  <div class="card">
    <div class="rp" id="rP"></div>
    <div class="rl">正答率</div>
    <div class="rm" id="rM"></div>
    <div class="rs" id="rS"></div>
    <div class="st">
      <div><div class="sn g" id="rO"></div><div style="font-size:11px;color:#8890a8;text-align:center">正解</div></div>
      <div><div class="sn r" id="rN"></div><div style="font-size:11px;color:#8890a8;text-align:center">不正解</div></div>
      <div><div class="sn" style="color:#8890a8" id="rTt"></div><div style="font-size:11px;color:#8890a8;text-align:center">合計</div></div>
    </div>
    <button class="btn gray" id="rtB">もう一度挑戦</button>
    <div class="rt">全問振り返り</div>
    <div id="rL"></div>
  </div>
</div>

</div>
<script>
var Q=[{"c":"第1章","q":"キャリア教育に対する代表的な誤解はどれか。","o":["A. 職業体験活動そのものがキャリア教育だ","B. キャリア教育は一人ひとりの社会的自立を促す教育だ","C. キャリア教育は全教育活動を通じて行う","D. キャリア教育は小学校から始まる"],"a":0,"e":"キャリア教育の最大の誤解は「職業体験活動=キャリア教育」という混同。職業体験はキャリア教育の手段の一つに過ぎない。"},{"c":"第1章","q":"平成23年中央教育審議会答申におけるキャリア発達の定義として正しいものはどれか。","o":["A. 職業に就くために必要な知識・技能を習得する過程","B. 社会の中で自分の役割を果たしながら自分らしい生き方を実現していく過程","C. 学校教育を通じて社会性を身につける過程","D. 就職から退職までの職業人生の流れ"],"a":1,"e":"平成23年答申はキャリア発達を「社会の中で自分の役割を果たしながら、自分らしい生き方を実現していく過程」と定義した。"},{"c":"第1章","q":"「基礎的・汎用的能力」の4つに含まれないものはどれか。","o":["A. 人間関係形成・社会形成能力","B. 自己理解・自己管理能力","C. 情報活用・情報収集能力","D. キャリアプランニング能力"],"a":2,"e":"基礎的・汎用的能力は①人間関係形成・社会形成能力②自己理解・自己管理能力③課題対応能力④キャリアプランニング能力。情報活用能力は含まれない。"},{"c":"第1章","q":"「人間関係形成・社会形成能力」の説明として最も正しいものはどれか。","o":["A. 将来の目標を設定し計画する力","B. 他者と協力・共同しながらコミュニティを形成する力","C. 困難な課題を分析し対処する力","D. 自己の強みと弱みを把握する力"],"a":1,"e":"人間関係形成・社会形成能力はコミュニケーション能力・チームワーク・リーダーシップなど、他者と関わりコミュニティを形成する力。"},{"c":"第1章","q":"「自己理解・自己管理能力」に最も関連する行動はどれか。","o":["A. 職場体験先で積極的に質問する","B. 自分の得意なことや価値観を振り返る","C. 地域の課題を発見し解決策を提案する","D. 将来の職業計画を立てる"],"a":1,"e":"自己理解・自己管理能力は自分の強み・弱み・価値観・感情を把握し、コントロールして行動する力。自己の振り返りが核心。"},{"c":"第1章","q":"「課題対応能力」の核心として最も適切なものはどれか。","o":["A. 他者と友好な関係を築く力","B. 課題を発見・分析し適切に対処する力","C. 将来のキャリアプランを描く力","D. 自己の感情をコントロールする力"],"a":1,"e":"課題対応能力は仕事や学習上の課題を発見・分析し、適切な計画を立て対処する力。問題解決・創造的思考が含まれる。"},{"c":"第1章","q":"「キャリアプランニング能力」として最も適切な説明はどれか。","o":["A. 人事部門が社員のキャリアを計画する能力","B. 将来の生き方や働き方を考え社会参加に向けて主体的に行動する能力","C. 受験や就職活動の計画を立てる能力のみ","D. 企業の事業計画を策定する能力"],"a":1,"e":"キャリアプランニング能力は自らの将来ビジョンを持ち、社会参加に向けて主体的に学び行動し続ける力。"},{"c":"第1章","q":"「職業教育」の定義として最も正確なものはどれか。","o":["A. 一人ひとりの社会的・職業的自立に必要な基盤を育む教育","B. 一定または特定の職業に従事するために必要な知識・技能・能力・態度を育む教育","C. 学校全体を通じて行うキャリア発達支援","D. 勤労観・職業観を育む教育活動"],"a":1,"e":"職業教育は特定の職業に従事するための知識・技能・能力・態度を育む教育。農業・工業・商業・看護などの専門教育が代表例。"},{"c":"第1章","q":"「キャリア」という概念として最も適切な説明はどれか。","o":["A. 職業・仕事の経歴のみ","B. 人が生涯にわたって果たす多様な役割と経験の連鎖・積み重ね","C. 大学での専攻分野","D. 転職や昇進の履歴"],"a":1,"e":"キャリアは職歴だけでなく、学生・職業人・家族の一員・地域の一員など、人が生涯にわたって担う様々な役割と経験の総体。"},{"c":"第1章","q":"キャリア教育が必要とされる背景として適切でないものはどれか。","o":["A. フリーター・ニートの増加","B. 産業構造・就業構造の変化","C. 少子高齢化の進展","D. 大学進学率の低下"],"a":3,"e":"大学進学率は上昇傾向で、「低下」はキャリア教育が必要とされる背景ではない。フリーター増加・産業変化・少子高齢化は正しい背景。"},{"c":"第1章","q":"「キャリア教育は特定の時間だけで行うものではない」という考え方として正しいものはどれか。","o":["A. 進路指導の時間のみで十分","B. 学校の教育活動全体を通じて意図的・継続的に行うべき","C. 職業体験の日のみに集中して行うべき","D. 総合的な学習の時間のみで実施できる"],"a":1,"e":"キャリア教育は特定の時間・活動に限定せず、各教科・特別活動・学校行事など教育活動全体を通じて意図的・継続的に行うことが重要。"},{"c":"第1章","q":"グローバル化がキャリア教育に与える影響として最も適切なものはどれか。","o":["A. 英語教育さえ強化すれば十分","B. 多様な文化・価値観と共存しながら活躍できる力や視野の必要性が高まる","C. 海外で働くことを全員が目指す必要がある","D. グローバル化はキャリア教育と無関係"],"a":1,"e":"グローバル化により多様な文化・価値観と共存し、国内外で活躍できる視野と力が求められる。キャリア教育でこうした素地を育てることが重要。"},{"c":"第1章","q":"「ニート」（NEET）の正確な定義はどれか。","o":["A. 失業中で職を探している若者","B. 教育・訓練を受けておらず、雇用もされていない若者","C. アルバイトのみで生活する若者","D. 大学を中退した若者"],"a":1,"e":"NEETはNot in Education, Employment or Trainingの略。学校教育も受けず、雇用もされず、職業訓練も受けていない状態の若者を指す。"},{"c":"第1章","q":"「フリーター」問題の深刻さとして最も適切な説明はどれか。","o":["A. 多様な働き方の選択肢として肯定的に捉えられる","B. 年齢が上がるにつれ正規雇用への転換が困難になり、生活不安・老後不安につながる","C. フリーターは高収入が保証されている","D. フリーターの問題は20代で自然に解決する"],"a":1,"e":"フリーター問題は年齢とともに深刻化する。正規雇用への転換困難・低収入・社会保険未加入・老後の年金不足など多面的なリスクがある。"},{"c":"第1章","q":"キャリア教育は「いつから始まるか」という問いへの正しい答えはどれか。","o":["A. 中学校から","B. 高校から","C. 幼児期・小学校段階から","D. 就職活動が始まる時期から"],"a":2,"e":"キャリア教育は幼児期・小学校段階から始まる。各発達段階に応じた内容で、社会的・職業的自立への基盤を継続的に育てる。"},{"c":"第1章","q":"「勤労観・職業観」を育てることがキャリア教育に含まれる理由はどれか。","o":["A. 子どもに特定の職業を早期選択させるため","B. 働くことへの肯定的な意識と正しい理解が、自立的なキャリア形成の土台になるから","C. 法律で職業教育が義務付けられているから","D. 大学入試に勤労観の問題が出るから"],"a":1,"e":"勤労観・職業観は「働くことの意義」への理解と肯定的な意識。これがキャリア発達・自立の精神的な土台となるため、育成が重要。"},{"c":"第1章","q":"「産業構造の変化」がキャリア教育に与える影響として最も適切なものはどれか。","o":["A. 特定の職業技能を早期に習得させることが重要","B. 変化に対応できる汎用的な能力と、主体的な学び直しの意欲・姿勢が必要","C. 製造業への就職指導を強化すべき","D. 産業変化はキャリア教育とは無関係"],"a":1,"e":"産業構造の変化が激しい現代では、特定技能の早期習得より汎用的な能力・変化適応力・主体的な学び直しの姿勢の方が長期的に価値を持つ。"},{"c":"第1章","q":"「基礎的・汎用的能力」が「汎用的」と呼ばれる理由はどれか。","o":["A. あらゆる教科で学力テストの得点向上につながるから","B. 特定の職業・場面に限らず様々な場面で活用できる能力だから","C. 全国どこでも同じ方法で教えられるから","D. 大学入試のどの科目にも対応しているから"],"a":1,"e":"「汎用的」とは特定の職業・状況に限らず、様々な場面・文脈で活用できるという意味。基礎的・汎用的能力はどんな仕事・生活場面でも使える力。"},{"c":"第1章","q":"「キャリア教育の充実」において家庭・地域が果たす役割として正しいものはどれか。","o":["A. 学校教育のみで完結するため家庭・地域は関係ない","B. 学校・家庭・地域・企業が連携してこそキャリア教育の効果が高まる","C. 家庭の役割はしつけのみ","D. 地域は職場体験先を提供するだけでよい"],"a":1,"e":"キャリア教育は学校だけでなく、家庭での会話・地域での体験・企業での職場体験など多様な場が連携してこそ効果が高まる。"},{"c":"第1章","q":"「平成23年答申」（今後の学校におけるキャリア教育・職業教育の在り方について）の意義として最も適切なものはどれか。","o":["A. 職業体験の実施を義務化したこと","B. キャリア教育と職業教育の定義を整理し、基礎的・汎用的能力を明示したこと","C. コーディネーターの資格制度を創設したこと","D. 全校種にキャリア担当教員の配置を義務付けたこと"],"a":1,"e":"平成23年答申はキャリア教育・職業教育の定義整理、基礎的・汎用的能力4つの明示など、現在のキャリア教育の基本的枠組みを提示した重要な答申。"},{"c":"第1章","q":"「少子高齢化」とキャリア教育の関連として最も適切なものはどれか。","o":["A. 少子化で子どもが減るためキャリア教育の重要性が下がる","B. 一人ひとりの若者がより高い能力・自立性を持つことが社会的に求められる","C. 高齢化はキャリア教育の対象外","D. 少子化対策はキャリア教育の本来の目的"],"a":1,"e":"少子高齢化で労働力が不足する社会では、一人ひとりの若者が高い能力・自立性を持ちより長く活躍することが社会的に重要になる。"},{"c":"第1章","q":"キャリア教育の対象として正しいものはどれか。","o":["A. 高校生のみ","B. 中学生と高校生のみ","C. 幼児期から大人まで生涯にわたる全ての人","D. 就職活動中の大学生のみ"],"a":2,"e":"キャリア教育は特定の校種・年齢に限らず、幼児期から社会人・生涯学習まで幅広く適用される。各段階に応じた発達支援が行われる。"},{"c":"第2章","q":"コーディネーターが「仲介役・橋渡し役」と呼ばれる理由はどれか。","o":["A. 行政と企業の間で取引を仲介するから","B. 学校と地域・企業・社会との間に立ち、連携・協働を促進するから","C. 教員と生徒の間に立って指導するから","D. 保護者と学校の間の苦情処理をするから"],"a":1,"e":"コーディネーターは学校（教育ニーズ）と地域・企業（社会資源）の間に立ち、両者をつなぐ橋渡しの役割を担うことから「仲介役・橋渡し役」と呼ばれる。"},{"c":"第2章","q":"コーディネーターの「3つの使命」として正しいものはどれか。","o":["A. 指導・評価・管理","B. 調整・開発・支援","C. 採用・育成・評価","D. 企画・運営・報告"],"a":1,"e":"コーディネーターの3つの使命は①調整（コーディネート）②開発（プログラム・人材・ネットワーク）③支援（学校・教員）。"},{"c":"第2章","q":"コーディネーターが「教員の支援者」であるとされる理由はどれか。","o":["A. コーディネーターの方が教育の専門家として優れているから","B. 教員が子どもの学びに集中できる環境を整えることでキャリア教育の質が高まるから","C. コーディネーターは行政から教員を指導する権限を与えられているから","D. 教員は多忙でやる気がないから"],"a":1,"e":"コーディネーターは教員の代わりではなく支援者。調整・手配業務を担うことで教員が子どもへの指導・学びの設計に集中でき、教育効果が高まる。"},{"c":"第2章","q":"コーディネーターが持つべき最も重要なスキルはどれか。","o":["A. 教員免許","B. 調整力・コミュニケーション力・情報収集力・企画力","C. プログラミング技術","D. 上場企業での経験"],"a":1,"e":"コーディネーターに最も必要なのは、多様な関係者をつなぐ調整力、対話力、ニーズを掘り起こす情報収集力、プログラムを設計する企画力など。"},{"c":"第2章","q":"コーディネーターが「地域人材を活かす」ために必要なことはどれか。","o":["A. 地域人材に多額の謝礼を支払う","B. 地域人材の強みを把握し、教育目的に合わせた形でつないで活躍の場を作る","C. 地域人材に教員免許を取得させる","D. 地域人材は行政が一元管理すべき"],"a":1,"e":"地域人材を活かすには、その人の強み・経験・専門性を把握し、学校のニーズとマッチングして活躍できる環境を整えることが重要。"},{"c":"第2章","q":"コーディネーターが学校との信頼関係を築くうえで最も重要なことはどれか。","o":["A. 高い学歴を持っていること","B. 学校の文化・慣習を理解し、教員の立場を尊重して丁寧にコミュニケーションをとること","C. 行政の権限を活用して学校に協力を求めること","D. 有名企業との人脈を持っていること"],"a":1,"e":"学校との信頼関係構築には、学校文化・慣習の理解と尊重、教員の立場・多忙さへの配慮、丁寧で誠実なコミュニケーションが基本。"},{"c":"第2章","q":"コーディネーターが「プログラム提案者」として機能できる根拠はどれか。","o":["A. 教員より多くの時間があるから","B. 全国・他地域の事例を学び多様なプログラムの引き出しを持っているから","C. 文部科学省から提案権限を与えられているから","D. 教員より経験豊富だから"],"a":1,"e":"コーディネーターは他地域・他校の事例を幅広く学ぶことで多様なプログラムの引き出しを持つ。学校のニーズに応じた選択肢を提示できる。"},{"c":"第2章","q":"「コーディネート団体」の機能として最も適切なものはどれか。","o":["A. 学校を経営・運営する","B. コーディネーターを組織的に支援し、学校と地域資源をつなぐネットワークを維持する","C. 企業の採用活動を代行する","D. 教員の研修を単独で実施する"],"a":1,"e":"コーディネート団体はコーディネーターを組織的に支え、学校からの依頼に対して地域人材・企業・機関とのマッチングを行う機能を持つ。"},{"c":"第2章","q":"コーディネーターが「中立的な立場」を保つことが重要な理由はどれか。","o":["A. 法律で中立性が義務付けられているから","B. 学校・企業・地域のどの立場にも偏らないことで、信頼を得て公正な調整ができるから","C. 中立でないと給与がもらえないから","D. 競合するコーディネーターへの対策として必要"],"a":1,"e":"コーディネーターが学校・企業・地域のどの立場にも偏らない中立的な立場を保つことで、全ての関係者から信頼を得て公正な調整が可能になる。"},{"c":"第2章","q":"コーディネーターが「自立」して活動することの意味として正しいものはどれか。","o":["A. 組織に属さず完全に個人で活動すること","B. 特定の依存先に頼りすぎず、専門性とビジョンをもって自律的に活動できること","C. 報酬なしでボランティアとして活動すること","D. 行政からの指示なしに自由に行動すること"],"a":1,"e":"自立したコーディネーターとは、特定の組織・依頼者への過度な依存なく、専門性・ビジョン・倫理観をもって自律的に判断・行動できる存在。"},{"c":"第2章","q":"コーディネーターが「教員の業務を代行する」ことについて正しいものはどれか。","o":["A. コーディネーターは必要に応じて授業を担当できる","B. 成績評価・授業実施などの教員固有の職務はコーディネーターが代行できない","C. コーディネーターは教員の全業務を代行できる","D. 校長の許可があれば全業務を代行できる"],"a":1,"e":"成績評価・授業実施などは教員の専門的職務であり、コーディネーターが代行することはできない。コーディネーターは連携・調整・支援を担う。"},{"c":"第2章","q":"コーディネーターが「継続的な関係」を学校と築く意義はどれか。","o":["A. 契約更新を有利にするため","B. 継続的な関係により学校の実情・文化・ニーズの理解が深まり、より適切な支援ができるから","C. 学校のすべての情報を把握するため","D. 行政への報告義務を果たすため"],"a":1,"e":"継続的な関係により、学校の文化・教員の考え方・生徒の実態・地域の状況が蓄積され、より実情に即した的確な支援・プログラム提案が可能になる。"},{"c":"第2章","q":"コーディネーターに「ファシリテーション能力」が求められる理由はどれか。","o":["A. 会議を短時間で終わらせるため","B. 多様な関係者が意見を出し合い協働できるよう場を整え、合意形成を促すため","C. 生徒の発言を制御するため","D. 行政の会議を主催するため"],"a":1,"e":"コーディネーターは多様な関係者が関わる場を設計・運営する機会が多い。参加者の発言を引き出し合意形成を促すファシリテーション能力が重要。"},{"c":"第2章","q":"コーディネーターが「評価・振り返り」を行う理由として最も適切なものはどれか。","o":["A. 行政への報告義務のため","B. 自己の活動を客観的に振り返り、改善してより質の高い支援を提供するため","C. 資格更新のために必要だから","D. 給与交渉の材料にするため"],"a":1,"e":"定期的な評価・振り返りにより、自己の強み・課題・活動の効果を客観的に把握し、次の支援の質向上につなげることができる。"},{"c":"第2章","q":"コーディネーターが「記録を残す」ことが重要な理由はどれか。","o":["A. 法律で義務付けられているから","B. 活動の成果を可視化し、後継者への引継ぎや組織の継続的発展に活かすため","C. 個人的な日記として残すため","D. 競合他社への情報提供のため"],"a":1,"e":"記録は活動の証跡・改善の材料・後継者への引継ぎ資料として重要。コーディネーター個人だけでなく組織・地域の知的資産になる。"},{"c":"第2章","q":"コーディネーターとして「誠実さ」が必要な理由はどれか。","o":["A. 誠実でないと法律違反になるから","B. 様々な関係者からの信頼が活動の基盤であり、誠実さがその信頼の根拠になるから","C. 誠実さは採用の条件だから","D. 上司への従順さとして求められるから"],"a":1,"e":"コーディネーターの活動基盤は信頼関係。学校・企業・地域・保護者など多様な関係者との信頼は、誠実さ・約束を守ること・正直さから生まれる。"},{"c":"第2章","q":"コーディネーターの「マインドセット」として最も重要なものはどれか。","o":["A. 学校の先生より自分の方が知識がある","B. 子どものため・地域のためという使命感と、関係者への敬意","C. 報酬を最大化することへの意欲","D. 失敗を絶対にしないという完璧主義"],"a":1,"e":"コーディネーターの根本にあるべきは「子どもと地域のため」という使命感と、関わる全ての人（教員・企業・地域の人）への敬意と感謝の気持ち。"},{"c":"第2章","q":"コーディネーターが「NPO等の団体と連携する」メリットはどれか。","o":["A. NPOを通じると行政の補助金が多くもらえる","B. NPOが持つ地域の人的ネットワーク・ノウハウ・活動実績を活かせる","C. NPOが全ての業務を代行してくれる","D. 連携によりコーディネーターの資格が取得できる"],"a":1,"e":"NPOは地域の人的ネットワーク・活動実績・支援のノウハウを持つ。連携することでコーディネーターの活動範囲と質が向上する。"},{"c":"第2章","q":"「一人のコーディネーターが一人でできることには限界がある」という考え方が示すことはどれか。","o":["A. コーディネーターは非効率な職種","B. 組織・ネットワーク・チームとして取り組むことで、より大きな効果を生み出せる","C. 一人では何もできないから活動すべきでない","D. コーディネーターは複数人で1チームが原則"],"a":1,"e":"一人のコーディネーターの能力・時間には限界がある。コーディネート団体や他の関係者と連携・協力することでより広く深い効果が生まれる。"},{"c":"第2章","q":"コーディネーターに「継続的な学習・研修」が必要な理由はどれか。","o":["A. 資格維持のための義務だから","B. 社会・教育・産業の変化に対応し、常に実践の質を高めるために必要だから","C. 他のコーディネーターとの競争のため","D. 行政への報告書作成に必要な知識を得るため"],"a":1,"e":"社会・教育・産業は常に変化する。コーディネーターは継続的な学習・研修を通じて最新の動向・方法論をキャッチアップし実践に活かすことが重要。"},{"c":"第2章","q":"コーディネーターが「感謝を伝える」ことが重要な理由はどれか。","o":["A. 礼儀上の形式的な義務だから","B. 協力者（地域人材・企業等）が「また協力したい」と思えるような関係を築くため","C. 法律で義務付けられているから","D. 感謝状を贈ることで税制上の優遇があるから"],"a":1,"e":"地域人材・企業は多くが無償または少ない謝礼で協力してくれる。真摯な感謝・フィードバックが「また協力したい」という気持ちを生み継続的な関係につながる。"},{"c":"第2章","q":"コーディネーターが「校長・教頭との関係」を重視する理由はどれか。","o":["A. 校長・教頭だけが予算を持っているから","B. 管理職の理解と支持を得ることで、学校全体でのキャリア教育推進がスムーズになるから","C. 管理職に命令してもらう必要があるから","D. 教育委員会への報告ルートだから"],"a":1,"e":"校長・教頭の理解と支持があれば、学校全体として組織的にキャリア教育に取り組む体制が作れる。管理職を味方にすることは活動の成否に大きく関わる。"},{"c":"第3章","q":"「4府省合同のキャリア教育推進」を行う省庁として正しいものはどれか。","o":["A. 文部科学省・厚生労働省・経済産業省・内閣府","B. 文部科学省・国土交通省・農林水産省・総務省","C. 外務省・防衛省・財務省・文部科学省","D. 環境省・法務省・厚生労働省・文部科学省"],"a":0,"e":"キャリア教育は文部科学省・厚生労働省・経済産業省・内閣府の4府省が連携して推進する。縦割り行政を超えた取り組み。"},{"c":"第3章","q":"「若者雇用促進法」の目的として正しいものはどれか。","o":["A. 18歳選挙権の導入","B. 若者の安定した雇用の促進と職業能力の開発向上","C. 外国人労働者の雇用促進","D. 高齢者の再雇用促進"],"a":1,"e":"若者雇用促進法は若者の安定した雇用の促進、職業能力の開発・向上、就職支援を総合的に推進することを目的とする法律。"},{"c":"第3章","q":"「職業能力開発促進法」とキャリア教育の関連として正しいものはどれか。","o":["A. 企業での職業訓練のみを対象とする","B. 生涯にわたる職業能力開発の促進という理念でキャリア教育と共通する","C. 廃止された法律でキャリア教育との関連はない","D. 大学のみに適用される"],"a":1,"e":"職業能力開発促進法は働く人の職業能力の継続的開発・向上を促進する。生涯を通じた能力開発という点でキャリア教育の理念と通じる。"},{"c":"第3章","q":"「企業のキャリア教育への参加」が「社会貢献活動」として位置付けられるのはなぜか。","o":["A. 法律で企業の教育参加が義務付けられているから","B. 次世代育成・地域貢献・人材育成という社会的価値があるから","C. 税制上の優遇措置が自動的に与えられるから","D. 企業の採用活動として直結するから"],"a":1,"e":"企業のキャリア教育参加は次世代育成・地域貢献・社会的責任の履行として位置付けられ、CSR（企業の社会的責任）活動の一環とされる。"},{"c":"第3章","q":"NPO等の民間団体がキャリア教育に参加する意義として最も適切なものはどれか。","o":["A. 行政の代わりに全ての教育活動を担う","B. 行政・学校では届きにくい多様な支援・プログラム・人材を地域に提供できる","C. 民間団体の宣伝活動として機能する","D. 教員の指導力不足を補う"],"a":1,"e":"NPO等の民間団体は行政・学校には難しいフットワーク・多様な人材・独自のノウハウを持ち、地域のキャリア教育を豊かにする存在。"},{"c":"第3章","q":"「行政のキャリア教育推進の役割」として最も適切なものはどれか。","o":["A. 全ての授業を直接実施する","B. 政策立案・予算確保・制度整備・情報提供・関係者の調整役を担う","C. 企業への強制的な参加義務付けをする","D. 保護者への啓発活動のみを行う"],"a":1,"e":"行政（国・都道府県・市区町村）は政策立案・予算確保・制度整備・情報提供・関係者の調整という役割を担い、現場の取り組みを支える。"},{"c":"第3章","q":"学校教育法におけるキャリア教育への言及として最も正確なものはどれか。","o":["A. 職業体験の実施回数が規定されている","B. 教育の目的・目標としてキャリア発達・社会的自立への支援が位置付けられている","C. コーディネーターの配置が義務付けられている","D. キャリア教育の予算が明記されている"],"a":1,"e":"学校教育法の改正により、キャリア教育・職業教育の推進が教育の目的・目標として法的に位置付けられた。"},{"c":"第3章","q":"「地域学校協働活動」とキャリア教育の関係として正しいものはどれか。","o":["A. 完全に別の取り組みで関連はない","B. 地域と学校が協働する枠組みの中でキャリア教育プログラムを実施することができる","C. 地域学校協働活動はキャリア教育のみを対象とする","D. コーディネーターは地域学校協働活動に関われない"],"a":1,"e":"地域学校協働活動は地域と学校が連携する枠組みで、キャリア教育プログラムの実施にも活用できる。"},{"c":"第3章","q":"「商工会議所・経済団体」がキャリア教育に参加する意義はどれか。","o":["A. 採用活動の一環として参加する","B. 地域経済の担い手である企業を束ね、学校との連携を組織的に推進できる","C. 行政への陳情窓口として機能する","D. コーディネーターを派遣する唯一の機関"],"a":1,"e":"商工会議所・経済団体は地域の企業を組織的に束ねており、学校と地域企業の連携を組織的・継続的に推進するハブ機能を持つ。"},{"c":"第3章","q":"「インターンシップの充実」がキャリア教育として求められる理由はどれか。","o":["A. 企業が安価な労働力を得られるから","B. 実際の職業体験を通じてキャリア発達・職業観の形成・社会性の育成が促されるから","C. 法律でインターンシップが義務付けられているから","D. 就職率の向上に直結するから"],"a":1,"e":"インターンシップは実際の職業・職場を体験することで、職業観の形成・自己理解の深化・社会性の育成など多面的なキャリア発達効果がある。"},{"c":"第3章","q":"「大学・高等教育機関」とキャリア教育の関係として正しいものはどれか。","o":["A. 大学ではキャリア教育は必要ない","B. 大学においてもキャリア支援・就職支援を含むキャリア教育が重要","C. 大学のキャリア教育は就職活動指導のみ","D. 大学はキャリア教育の対象外"],"a":1,"e":"大学においてもキャリア教育は重要。学問と将来の結びつきへの理解、インターンシップ、卒業後のライフデザインなど幅広い支援が求められる。"},{"c":"第3章","q":"「4府省合同キャリア教育推進」の目的として最も適切なものはどれか。","o":["A. 各省庁の予算を削減するため","B. 縦割り行政を超えてキャリア教育を総合的・一体的に推進するため","C. 文部科学省の権限を他省庁に移譲するため","D. 地方自治体への権限移譲を進めるため"],"a":1,"e":"4府省が連携する目的は、教育・雇用・産業・政策が縦割りにならず、若者のキャリア形成支援を総合的・一体的に推進するため。"},{"c":"第3章","q":"「キャリア教育推進連携シンポジウム」などの普及活動の意義はどれか。","o":["A. コーディネーターの資格を授与するため","B. 好事例・知見を広く共有し、全国レベルでのキャリア教育の質の向上を図るため","C. 文部科学省の政策を宣伝するため","D. 参加者の資格認定のため"],"a":1,"e":"シンポジウム・研修会などの普及活動は、好事例・研究知見・実践ノウハウを広く共有することで全国レベルでのキャリア教育の質向上に貢献する。"},{"c":"第3章","q":"「PTA」がキャリア教育に果たせる役割として最も適切なものはどれか。","o":["A. PTAはキャリア教育と無関係","B. 保護者の職業・経験を活かした職業講話や、家庭でのキャリアに関する対話促進","C. PTAはキャリア教育の全てを運営する","D. PTAは学校のキャリア教育を批判・監視する役割"],"a":1,"e":"PTAは保護者の多様な職業・経験をキャリア教育に活かす場を作れる。また家庭でのキャリアに関する会話を促進する啓発活動も行える。"},{"c":"第3章","q":"キャリア教育をめぐる法改正で重要なものはどれか。","o":["A. 学校教育法に「キャリア教育」の文言が明記された","B. 職業教育が義務教育に組み込まれた","C. すべての中学校にコーディネーターの配置が義務付けられた","D. 企業の教育参加が法律で禁止された"],"a":0,"e":"学校教育法の改正により、学校でのキャリア教育の推進が法的に位置づけられた。これはキャリア教育の制度的基盤として重要。"},{"c":"第4章","q":"「地域資源」として最も広義に定義されるものはどれか。","o":["A. 地域の企業・工場のみ","B. 人・もの・場・情報・ネットワークなど、キャリア教育に活用できるあらゆる資源","C. 地方自治体の公共施設のみ","D. 商工会議所に登録された企業のみ"],"a":1,"e":"地域資源は企業だけでなく、職業人（人）・農場・商店街（場）・産業情報（情報）・地域のつながり（ネットワーク）など多岐にわたる。"},{"c":"第4章","q":"地域資源の「人材」として活用できるものとして最も適切なものはどれか。","o":["A. 有名人・芸能人のみ","B. 地域で働く職業人・元職業人・各種専門家・シニアなど多様な人材","C. 海外在住の日本人のみ","D. 公務員のみ"],"a":1,"e":"地域人材として活用できるのは、医師・農家・職人・会社員など地元で実際に働く人、退職した元職業人、多様なバックグラウンドを持つシニアなど。"},{"c":"第4章","q":"地域資源の「場」として活用できるものはどれか。","o":["A. 学校の教室のみ","B. 農場・工場・商店・公民館・図書館・公園など地域にある様々な場所","C. 市役所のみ","D. 大学のキャンパスのみ"],"a":1,"e":"地域の「場」として農場・工場・商店街・商店・図書館・博物館・公民館・病院など様々な場所がキャリア教育の体験フィールドになりうる。"},{"c":"第4章","q":"ネットワーク構築において「双方向の関係」が重要な理由はどれか。","o":["A. 法律で双方向関係が義務付けられているから","B. 一方的な依頼関係では継続性が生まれず、お互いの強みを活かす協働関係が必要だから","C. 双方向の方が費用が安いから","D. 行政が双方向性を評価基準としているから"],"a":1,"e":"一方的な依頼・利用の関係では継続性が生まれにくい。学校・地域・企業それぞれの強みを活かし、相互に価値を見出せる双方向の関係が持続するネットワークの基盤。"},{"c":"第4章","q":"「キーパーソン」との関係構築が重要な理由はどれか。","o":["A. キーパーソンは行政の許可権限を持つから","B. 地域の信頼される中心的人物を味方につけることでネットワークが広がりやすくなるから","C. キーパーソンだけに連絡すれば効率的だから","D. キーパーソンはコーディネーターを雇用する立場だから"],"a":1,"e":"地域のキーパーソン（信頼される中心的存在）との関係を築くことで、その人のネットワークを通じてコーディネーターの活動範囲が広がりやすくなる。"},{"c":"第4章","q":"「地域資源のデータベース化」の利点として最も適切なものはどれか。","o":["A. データベースを公開することで企業が広告効果を得られる","B. 資源の全体像を可視化・整理し、コーディネーター間や組織内で共有・活用しやすくなる","C. 行政への義務的な提出書類として必要","D. データベースを持つことで資格が取得できる"],"a":1,"e":"地域資源のデータベース化は、資源の全体把握・検索性向上・引継ぎ容易化・組織内共有など多くの利点をもたらす。"},{"c":"第4章","q":"地域資源の発掘において最も重要なことはどれか。","o":["A. インターネット検索のみで情報を収集する","B. 既存のデータベースに頼らず実際に地域に出て関係者に会いニーズと資源を把握する","C. 県の教育委員会が提供するリストのみを使う","D. 全国共通のリストから選択する"],"a":1,"e":"地域資源の発掘には実際にフィールドに出て、地域の人々と対話し、ニーズや活用可能な資源を直接把握することが重要。"},{"c":"第4章","q":"ネットワークが「維持」されにくい原因として最も適切なものはどれか。","o":["A. 参加者が多すぎる","B. 担当者の異動や組織変更による関係の断絶、目的・成果の不明確化","C. 予算が十分すぎる","D. 行政の支援が手厚すぎる"],"a":1,"e":"ネットワークが維持されない主な原因は、担当者異動による関係断絶、目的や成果が見えにくくなること、定期的なコミュニケーション不足などがある。"},{"c":"第4章","q":"地域ネットワークをコーディネーターが活用する際の基本姿勢として適切なものはどれか。","o":["A. 自分の組織の利益を最優先にする","B. 地域全体の利益・子どもたちの学びを中心に置き、各主体の強みを活かす","C. 競合する他の団体とは関係を持たない","D. 行政からの指示のみに従って動く"],"a":1,"e":"ネットワーク活用の基本は地域全体・子どもたちの学びを中心に置くこと。各主体の強みを活かし相互に補完し合う関係構築が重要。"},{"c":"第4章","q":"「地域の課題」が地域資源の発掘とつながる例として最も適切なものはどれか。","o":["A. 関係がなく切り離して考える","B. 農業人口の高齢化という課題から農業体験・農家との連携というキャリア教育の機会が生まれる","C. 地域課題はコーディネーターが解決すべき","D. 地域課題は行政だけが対処する"],"a":1,"e":"農業人口高齢化→農家との連携、商店街の空洞化→商店主との関わり、など地域課題そのものがキャリア教育の文脈と接続する地域資源につながる。"},{"c":"第4章","q":"「学校区」を越えた広域ネットワークの意義はどれか。","o":["A. 学区内だけで完結させるべきで広域は不要","B. 学区内に不足する資源を補い、より多様なプログラムを提供できる","C. 広域ネットワークは行政のみが管理する","D. 広域ネットワークはコーディネーターの仕事ではない"],"a":1,"e":"学区内では得られない専門家・施設・体験機会を広域ネットワークで補完できる。地域の資源の偏りを補う効果もある。"},{"c":"第4章","q":"「コーディネーターとしての人脈形成」の基本的な考え方はどれか。","o":["A. 量（人脈の広さ）が全て","B. 信頼関係に基づいた質の高いつながりを丁寧に積み重ねる","C. SNSでのフォロワー数を増やす","D. 名刺交換の数を最大化する"],"a":1,"e":"人脈形成は量より質。信頼関係に基づいた深いつながりの方が、実際のコーディネート場面で力を発揮する。"},{"c":"第4章","q":"「地域資源の活用における倫理」として最も重要なものはどれか。","o":["A. より多くの資源を安く使うこと","B. 協力者の立場・都合・意思を尊重し、対等・誠実な関係を保つこと","C. 学校の要求を全て満たすこと","D. 行政の指示に従うだけ"],"a":1,"e":"地域資源（人・場・企業）の活用では、協力者への感謝・尊重・対等な関係が倫理の基本。搾取的な関係はネットワークを壊す。"},{"c":"第4章","q":"「オンラインを活用した地域資源の活用」として正しいものはどれか。","o":["A. オンラインでは本物の体験にならないため活用すべきでない","B. 遠隔地の専門家・施設とのオンライン講演・交流など、地理的制約を超えた活用が可能","C. オンライン活用は都市部のみ有効","D. オンラインは保護者向けの情報発信のみに使う"],"a":1,"e":"オンラインを活用することで遠隔地の専門家による講演、他地域の施設との交流、地方の子どもが都市部の職業人と交流するなど、地理的制約を超えた活用が可能。"},{"c":"第5章","q":"企業がキャリア教育に参加する主な動機として適切でないものはどれか。","o":["A. CSR活動としての社会貢献","B. 社員の人材育成・コミュニケーション力向上","C. 直接的な採用活動・リクルート","D. 地域への貢献とブランドイメージの向上"],"a":2,"e":"小中学校等でのキャリア教育参加は直接の採用活動ではない。CSR・社員育成・地域貢献が主な動機。採用直結の活動は企業側の動機として不適切。"},{"c":"第5章","q":"「CSR」とは何の略か。","o":["A. Corporate Social Responsibility（企業の社会的責任）","B. Customer Service Report（顧客サービス報告）","C. Creative School Resource（創造的学校資源）","D. Community Support Reform（地域支援改革）"],"a":0,"e":"CSRはCorporate Social Responsibilityの略で「企業の社会的責任」。環境・社会・人材育成・教育など多面的な責任を企業が果たすこと。"},{"c":"第5章","q":"企業が職場体験を受け入れる際の課題として最も適切なものはどれか。","o":["A. 法律上の許可が必要","B. 担当者の時間・業務への影響・安全管理の負担がある","C. 全ての企業が受け入れを義務付けられている","D. 受け入れると税金が増える"],"a":1,"e":"職場体験受け入れには担当者確保、通常業務への影響、怪我等の安全管理など企業側の負担がある。これを軽減する配慮・支援がコーディネーターの役割。"},{"c":"第5章","q":"企業の教育支援が「継続」するための条件として最も重要なものはどれか。","o":["A. 高額の謝礼を毎回支払う","B. 企業が「参加して良かった」と感じられる意義・フィードバックが返ってくること","C. 法律で継続を義務付ける","D. 行政が強制的に継続させる"],"a":1,"e":"企業の継続的参加には「やって良かった」という実感が不可欠。生徒・学校からの感謝、参加の意義の実感、社員の成長実感などが継続の原動力。"},{"c":"第5章","q":"企業の「社員をキャリア教育に派遣する」ことのメリットとして適切なものはどれか。","o":["A. 社員が仕事をサボれる機会になる","B. 自分の仕事の意義を語ることで社員自身の仕事観・自己理解が深まる","C. 企業の広告・宣伝費の節約になる","D. 派遣した社員の残業代が不要になる"],"a":1,"e":"子どもに自分の仕事を語ることで社員は自らの仕事の意義・価値を再認識できる。コミュニケーション力や教育力の向上、モチベーション向上の効果もある。"},{"c":"第5章","q":"「地域の現状理解」がキャリア教育の内容設計に必要な理由はどれか。","o":["A. 地元の観光PRに活かすため","B. 子どもの将来像と地域の産業・雇用が関連し、リアルな文脈でキャリアを考えられるから","C. 地方自治体の政策に従うため","D. 全国統一のカリキュラムに合わせるため"],"a":1,"e":"子どもが「自分の地域でどう生きるか・働くか」をリアルに考えるためには、地域の産業・雇用・課題を知ることが土台になる。"},{"c":"第5章","q":"「キャリア教育支援の格差」が生じる主な原因として適切なものはどれか。","o":["A. 生徒の学力差","B. 地域の産業構造・人口規模・NPO等の存在・コーディネーターの有無などの違い","C. 教員の年齢差","D. 学校施設の新旧"],"a":1,"e":"キャリア教育支援の地域格差は産業構造・人口規模（企業・人材の多寡）・支援団体の有無・コーディネーターの配置状況などによって生じる。"},{"c":"第5章","q":"「企業への依頼」において重要なことはどれか。","o":["A. できるだけ多くの企業に一括してメールを送る","B. 企業のビジョン・事業内容を理解したうえで、双方に意義のある形での参加を丁寧に提案する","C. 有名企業のみに依頼する","D. 行政の名前を前面に出して依頼する"],"a":1,"e":"企業への依頼は企業の事業内容・価値観を理解し、学校の教育目標と企業の強みを結びつけた具体的な提案が重要。双方に意義ある関係を設計する。"},{"c":"第5章","q":"「地域企業との長期的パートナーシップ」を構築するメリットはどれか。","o":["A. コーディネーターの独占的な情報源になる","B. 蓄積された相互理解が質の高いプログラムの実現と継続につながる","C. 競合するコーディネーターへの対策になる","D. 企業の経営指導ができる"],"a":1,"e":"長期的パートナーシップにより互いの事情・強み・ニーズへの理解が深まり、毎年より質の高いプログラムが実現できる。信頼の積み重ねが価値を生む。"},{"c":"第5章","q":"「企業の社会貢献活動担当者」とコーディネーターが連携する意義はどれか。","o":["A. 企業の会計情報にアクセスするため","B. CSR担当者を通じて組織的・継続的な協力関係を構築しやすくなるから","C. 企業の経営方針に関与するため","D. 採用担当者との連絡を避けるため"],"a":1,"e":"企業のCSR・社会貢献担当者は組織として教育参加を推進する窓口。この担当者と良好な関係を持つことで組織的・継続的な協力関係が安定する。"},{"c":"第5章","q":"「職場体験先の開拓」においてコーディネーターが心がけることはどれか。","o":["A. 毎年同じ企業のみを使い続ける","B. 地域の多様な職業・産業を体験できるよう幅広く開拓し、生徒の興味に対応できる選択肢を広げる","C. 有名企業・人気職業のみに集中する","D. 学校の近くの企業のみを使う"],"a":1,"e":"職場体験先は多様な職業・産業をカバーすることで、様々な興味・進路希望を持つ生徒全員に意味ある体験を提供できる。幅広い開拓が重要。"},{"c":"第5章","q":"「企業の社会貢献活動」とキャリア教育参加の関係として正しいものはどれか。","o":["A. 全く無関係","B. 教育参加がCSR活動の一環として社会的価値を持ち、企業のステークホルダーへの説明になりうる","C. CSRは環境活動のみ","D. CSR活動は行政が決める"],"a":1,"e":"教育参加・地域貢献はCSR活動の重要な柱の一つ。社員・株主・地域社会など多様なステークホルダーに対して社会的責任を果たす活動として評価される。"},{"c":"第5章","q":"「自治体の取り組み」としてキャリア教育支援に含まれるものはどれか。","o":["A. キャリア教育コーディネーターの配置・支援補助","B. 教員の採用試験の実施のみ","C. 大学入試制度の策定","D. 企業の社内研修の実施"],"a":0,"e":"自治体によるキャリア教育支援には、コーディネーターの配置補助、地域の企業との連携促進、キャリア教育推進計画の策定などが含まれる。"},{"c":"第5章","q":"「地域の小規模企業が価値ある体験資源になる」理由はどれか。","o":["A. 大企業より給料が高いから","B. 地域に根ざした仕事・生き方を直接感じられ、子どもの身近な将来像につながるから","C. 小規模企業の方が安全管理が容易だから","D. 行政が小規模企業を優先するよう指示しているから"],"a":1,"e":"地域の小規模企業・自営業・農家・職人などは、子どもが自分の地域でのリアルな働き方・生き方を感じられる貴重な資源。大企業にはない価値がある。"},{"c":"第6章","q":"「非正規雇用の拡大」がキャリア教育に突きつける問いはどれか。","o":["A. 非正規雇用を減らすための政治活動の方法","B. 多様な雇用形態の現実を理解したうえで、自分にとっての望ましい働き方を主体的に考える力","C. 非正規雇用を選ばないよう強くマイナスイメージを持たせること","D. 正規雇用の大企業への就職のみを目標にすること"],"a":1,"e":"非正規雇用の増加という現実の中で、若者が雇用形態の違いを理解し、自分らしいキャリアを主体的に考える力を育てることがキャリア教育の課題。"},{"c":"第6章","q":"「ニート」の増加がキャリア教育の課題として挙げられる理由はどれか。","o":["A. ニートが増えると消費が増えるから","B. 社会とのつながりを失った若者を早期に支援し自立を促すことが社会的に急務だから","C. ニートは幸福度が高いから支援が必要ない","D. ニートの問題は個人の責任だから教育は関係ない"],"a":1,"e":"ニートの増加は社会的孤立・将来の生活不安・社会の活力低下につながる。学校段階からのキャリア教育で自立意識・社会参加意欲を育てることが重要。"},{"c":"第6章","q":"「雇用のミスマッチ」の原因として最も適切なものはどれか。","o":["A. 求人数の不足","B. 企業が求める人材像・能力と求職者の持つ能力・職業観のずれ","C. 転職希望者が多すぎること","D. 採用担当者の能力不足"],"a":1,"e":"雇用ミスマッチは企業が求める能力・スキル・職業観と、求職者が持つそれとの不一致が主因。キャリア教育はこの橋渡しの役割を担う。"},{"c":"第6章","q":"地域の産業特性を理解することが「キャリア教育の内容設計」に重要な理由はどれか。","o":["A. 地域の産業を称えるコンテンツを作るため","B. 子どもが自分の地域での現実的な将来像を描けるようにするため","C. 地域の税収計画に貢献するため","D. 文部科学省への報告に必要だから"],"a":1,"e":"地域の産業特性を知ることで、その地域で生きていく子どもにとってリアルで意味ある将来像と結びついたキャリア教育プログラムを設計できる。"},{"c":"第6章","q":"「農林水産業の担い手不足」という地域課題とキャリア教育の関連として正しいものはどれか。","o":["A. 農業はキャリア教育の対象にならない","B. 農業体験・農家との交流を通じて農業の魅力や多様な働き方を伝えるキャリア教育ができる","C. 農業就労を全員に義務付けるための教育","D. 農林水産省の指示に従うために学ぶ"],"a":1,"e":"農林水産業の担い手不足という地域課題を農業体験・農家との交流プログラムと結びつけることで、農業の魅力・多様な働き方・地域への貢献を学ぶキャリア教育になる。"},{"c":"第6章","q":"「高齢化と働き方」についてキャリア教育が伝えることとして適切なものはどれか。","o":["A. 定年まで同じ会社で働くことが唯一の正解","B. 人生100年時代において生涯を通じて学び・働き・社会参加する視点が重要","C. 高齢者の就労はキャリア教育の対象外","D. 早期退職が理想のキャリア"],"a":1,"e":"高齢化により人生100年時代となった現代では、定年後も働き・学び・社会貢献し続けるライフデザインが重要。この視点をキャリア教育に組み込むことが必要。"},{"c":"第6章","q":"「働くことの意義」をキャリア教育で伝える際の最も適切な視点はどれか。","o":["A. 働くことは苦しいが仕方のないもの","B. 働くことを通じて自己実現・社会貢献・他者とのつながりなど多様な価値が得られる","C. 高収入を得ることが働く最大の目的","D. 安定した職業を選ぶことが最優先"],"a":1,"e":"「働く意義」は収入だけでなく自己実現・社会への貢献・他者とのつながりの中にある。多様な視点から「なぜ働くか」を考える力がキャリア教育で育まれる。"},{"c":"第6章","q":"「地方創生」とキャリア教育の関連として最も適切なものはどれか。","o":["A. 地方創生はキャリア教育と無関係","B. 地域の魅力を伝えるキャリア教育は、地域への愛着・地元での就労意欲の醸成につながる","C. 地方創生は行政のみの課題","D. キャリア教育で全員を地元に就職させるべき"],"a":1,"e":"地域の産業・文化・魅力を伝えるキャリア教育は、地域への誇り・愛着・地元での就労や社会参加への意欲を育て、地方創生の人材育成面に貢献する。"},{"c":"第6章","q":"「ワーク・ライフ・バランス」の概念をキャリア教育に含める意義はどれか。","o":["A. 仕事時間を最大化することが目標","B. 仕事と生活の調和という視点が、持続可能なキャリア・豊かな人生設計の基盤になるから","C. 早退・欠勤を促進するため","D. 企業の労働時間管理のため"],"a":1,"e":"ワーク・ライフ・バランスの視点を学ぶことで、長期的に健康で持続可能なキャリアを設計する力が育つ。仕事だけでなく生活全体を豊かにする視点が重要。"},{"c":"第6章","q":"「起業・創業」について学校でのキャリア教育に含める意義はどれか。","o":["A. 全員が起業家になるよう指導するため","B. 多様なキャリアの選択肢として起業という働き方への理解と主体的思考力を育てるため","C. 起業は危険なので否定的に教えるため","D. 法律で起業教育が義務化されているから"],"a":1,"e":"起業・創業は現代の多様な働き方の一つ。起業家精神（創造性・チャレンジ精神・課題解決力）を育てることは、就職する場合でも活きる汎用的な力になる。"},{"c":"第6章","q":"「産業の変化とキャリアの多様化」についてキャリア教育が伝えるべきことはどれか。","o":["A. 一つの会社で一生働くことが最善","B. 産業・職業の変化に対応し、主体的に学び続け柔軟にキャリアを更新できる力が必要","C. 変化する産業には近づかない","D. 最初の職業選択が人生の全てを決める"],"a":1,"e":"産業の変化が激しい現代では、特定のスキルよりも変化に適応し学び続ける力と、主体的にキャリアを更新する姿勢がより価値を持つ。"},{"c":"第6章","q":"「障害者雇用」に関連してキャリア教育で育てるべき視点はどれか。","o":["A. 障害のある人は特別な職業のみに就くべき","B. 多様な人が共に働く社会への理解・多様性を尊重する意識の育成","C. 障害者雇用はキャリア教育と無関係","D. 障害者の仕事は保護されるべきで競争には参加しない"],"a":1,"e":"障害者雇用の現実を学ぶことで、多様な人が共に働く社会への理解・インクルーシブな職場観・多様性を尊重する意識を育てることができる。"},{"c":"第6章","q":"「労働法」の基礎知識をキャリア教育で学ぶ目的として最も適切なものはどれか。","o":["A. 弁護士・司法書士を目指す人のみが学ぶ","B. 自分の働く権利を知り、不当な扱いから身を守り適切に対処できるようにするため","C. 企業の側に立って労働者を管理するため","D. 法律の暗記が試験に出るから"],"a":1,"e":"労働法（労働基準法・労働契約法等）の基礎を知ることで、自らの権利を理解し、不当な待遇・違法な扱いに対して適切に対処できる力が育つ。"},{"c":"第6章","q":"「年長フリーター」の問題として最も適切な記述はどれか。","o":["A. 若者が多様な働き方を自由に選択できる良い傾向である","B. 年齢を重ねるにつれ正規雇用への転換が難しくなり、将来の生活不安や社会保障の問題につながる","C. 30代以上のフリーターは実質的に正規社員と同等の待遇が保障されている","D. 年長フリーターは経験豊富なため企業に歓迎されている"],"a":1,"e":"年長フリーターは年齢が上がるほど正規雇用への転換が困難になり、収入不安定・老後の年金不足・社会保障の問題など深刻なリスクを抱える。"},{"c":"第7章","q":"「教育委員会」が首長から独立している理由として最も適切なものはどれか。","o":["A. 教育費を節約するため","B. 教育の政治的中立性・継続性・安定性を確保するため","C. 教員の給与を独自に決定するため","D. 国の教育政策に反対するため"],"a":1,"e":"教育委員会が首長から独立した合議制機関である理由は、教育が特定の政治的勢力の影響を受けず、中立・継続・安定して行われるようにするため。"},{"c":"第7章","q":"教育委員会における「教育委員」の特徴として正しいものはどれか。","o":["A. 全員が現役の教員","B. 保護者・地域住民・識者など多様なバックグラウンドを持つ非常勤の委員","C. 国から派遣される常勤の職員","D. 議会で選挙により選ばれる"],"a":1,"e":"教育委員は保護者・地域住民・有識者など多様な背景を持つ人が首長により任命される非常勤の委員。教員出身者だけでなく民間人も含む。"},{"c":"第7章","q":"「新教育長」制度（平成27年改正）の特徴として正しいものはどれか。","o":["A. 教育長と教育委員長を廃止した","B. 教育委員長と教育長を一本化し、教育長が教育委員会の代表者として常勤で職務を担う","C. 教育長を選挙で選ぶようになった","D. 文部科学省が直接教育長を任命するようになった"],"a":1,"e":"平成27年の地方教育行政法改正で、これまでの教育委員長と教育長を一本化した「新教育長」制度が導入された。首長が直接任命し責任が明確化された。"},{"c":"第7章","q":"「総合教育会議」の説明として正しいものはどれか。","o":["A. 保護者のみが参加する会議","B. 首長と教育委員会が連携・協議するために設置された会議","C. 国と都道府県が教育政策を協議する会議","D. 教員採用試験の合否を決定する会議"],"a":1,"e":"総合教育会議は平成27年改正で設置が義務付けられた。首長と教育委員会が地域の教育の振興・充実に向けて協議・連携する場。"},{"c":"第7章","q":"「文部科学省」のキャリア教育における役割として最も適切なものはどれか。","o":["A. 全国の学校で直接授業を実施する","B. キャリア教育の政策立案・ガイドライン策定・推進事業の実施・普及啓発","C. 各学校のキャリア教育プログラムを審査・認定する","D. コーディネーターを全国に直接派遣する"],"a":1,"e":"文部科学省はキャリア教育の政策・方針の策定、ガイドライン・手引き書の発行、推進事業・研究指定・情報普及などのマクロな推進役を担う。"},{"c":"第7章","q":"「都道府県教育委員会」のキャリア教育における役割として最も適切なものはどれか。","o":["A. 県内全ての学校で直接授業を実施する","B. 広域的調整・教員研修・市区町村への指導助言・優良事例の普及など","C. 市区町村の予算を全て管理する","D. 企業への参加強制を行う"],"a":1,"e":"都道府県教育委員会は県内全域の広域的調整・教員研修の実施・市区町村への指導助言・優良事例の収集普及など、中間的な支援役割を担う。"},{"c":"第7章","q":"「市区町村教育委員会」のキャリア教育における役割として最も適切なものはどれか。","o":["A. 国の政策だけに従い独自の取り組みはしない","B. 地域の実情に応じた具体的な施策の実施・学校への支援・地域との連携推進","C. 高校・大学の入試制度を決定する","D. 国の補助金を全て管理する"],"a":1,"e":"市区町村教育委員会は最も現場に近い行政機関。地域の実情を踏まえた具体的な施策実施・学校への日常的な支援・地域ネットワークの構築推進を担う。"},{"c":"第7章","q":"「コミュニティ・スクール（学校運営協議会制度）」の特徴として正しいものはどれか。","o":["A. 保護者が学校の予算を直接管理する","B. 地域住民・保護者・教員が学校運営に参画し、学校と地域が一体となって子どもを育てる仕組み","C. 教育委員会を廃止する制度","D. 私立学校のみに適用される制度"],"a":1,"e":"コミュニティ・スクールは学校運営協議会が設置され、地域住民・保護者が学校運営の基本方針の承認などに参画。地域と学校が一体となる仕組み。"},{"c":"第7章","q":"「学校評議員制度」の目的として最も適切なものはどれか。","o":["A. 学校の経営を外部の専門家に移譲するため","B. 地域住民・保護者・識者の声を学校運営に反映させ、開かれた学校づくりを推進するため","C. 学校の評価点数を計算するため","D. 教員の勤務評価を行うため"],"a":1,"e":"学校評議員制度は地域住民・保護者・有識者が評議員として学校運営への意見を述べる仕組み。開かれた学校づくりと地域との連携推進が目的。"},{"c":"第7章","q":"「教育振興基本計画」とは何か。","o":["A. 各学校が毎年作成するカリキュラム計画","B. 政府が定める教育の振興に関する基本的な計画で、今後の教育施策の方向を示す","C. 教育委員会の予算計画","D. 都道府県独自の教育改革計画"],"a":1,"e":"教育振興基本計画は教育基本法に基づき政府が策定する教育振興の基本的な計画。概ね5年ごとに策定され、国の教育施策の方向性を示す。"},{"c":"第7章","q":"「行政との連携」においてコーディネーターが大切にすべきことはどれか。","o":["A. 行政の担当者に全ての判断を任せる","B. 行政の役割・制約・優先事項を理解しながら、対等なパートナーとして連携する","C. 行政への依存を避けて完全に独立して活動する","D. 行政を批判することで良い関係が生まれる"],"a":1,"e":"行政との連携では、行政の役割・制度的制約・優先事項を理解したうえで対等なパートナーシップを築くことが重要。依存もせず、敵対もしない関係。"},{"c":"第7章","q":"「教育委員会の運営」において合議制が採用されている理由はどれか。","o":["A. 決定に時間をかけるため","B. 多様な意見・価値観を反映させ、特定個人の判断に依存しない民主的な運営のため","C. 費用を節約するため","D. 国の指示に従いやすくするため"],"a":1,"e":"教育委員会は合議制をとる。これは多様な立場・意見を反映させ、特定の個人・勢力の意向に左右されない民主的で中立な教育行政を実現するため。"},{"c":"第7章","q":"「キャリア教育を推進する組織と予算」に関する記述として正しいものはどれか。","o":["A. キャリア教育の予算は文部科学省のみが確保している","B. 文部科学省・厚生労働省・経済産業省など複数省庁が関連予算を持つ","C. キャリア教育に公的予算は存在しない","D. 地方自治体は独自の予算を持てない"],"a":1,"e":"キャリア教育関連予算は文部科学省だけでなく厚生労働省（若者支援）・経済産業省（企業連携推進）なども持ち、複数省庁が関わる。"},{"c":"第7章","q":"市区町村教育委員会が学校に対して持つ権限として最も適切なものはどれか。","o":["A. 学校の建設・整備のみ","B. 公立学校の設置・管理・教職員の任命・教育課程の監督など","C. 私立学校への補助金配分のみ","D. 学力テストの実施のみ"],"a":1,"e":"市区町村教育委員会は公立学校の設置・管理・教職員の任命権・教育課程の監督など広範な権限を持つ。"},{"c":"第8章","q":"「校長のリーダーシップ」がキャリア教育推進に重要な理由はどれか。","o":["A. 校長が全ての授業を担当するから","B. 校長の方針・優先事項が学校全体の取り組み方向に大きく影響するから","C. 校長が地域企業と契約を結ぶから","D. 法律で校長がキャリア教育を実施する義務があるから"],"a":1,"e":"校長のリーダーシップはキャリア教育を学校の優先事項として位置付け、全教員が取り組む組織的な体制を作るための核心。校長の理解と支持が推進の鍵。"},{"c":"第8章","q":"「進路指導主事」の役割として最も適切なものはどれか。","o":["A. 全教科の授業を担当する","B. 学校全体のキャリア教育・進路指導を企画・調整し、関係教員や外部機関との連絡を担う","C. 生徒の成績を管理する","D. PTAとの連絡のみを担当する"],"a":1,"e":"進路指導主事は学校のキャリア教育・進路指導の中心的担当者。プログラムの企画・調整、教員への情報提供、外部機関との連絡など多岐にわたる業務を担う。"},{"c":"第8章","q":"「担任教員」とコーディネーターの連携で最も重要なことはどれか。","o":["A. 担任の授業に代わって実施する","B. 事前・体験・事後の各段階で密に情報共有し、教員が生徒の学びをつなぐサポートをする","C. 担任の仕事を肩代わりする","D. 担任よりも生徒と親密な関係を作る"],"a":1,"e":"担任教員は生徒を最もよく知る存在。事前学習・体験・事後学習の各段階でコーディネーターと情報共有し、教員が生徒の学びをつなぐ中心的役割を果たす。"},{"c":"第8章","q":"「養護教諭」とキャリア教育の関連として正しいものはどれか。","o":["A. 養護教諭はキャリア教育と無関係","B. 生徒のメンタルヘルス・健康面の把握や、保健・医療関連のキャリア教育に関与できる","C. 養護教諭はキャリア教育の担当者として最も重要","D. 養護教諭は体育のみを担当する"],"a":1,"e":"養護教諭は生徒の心身の健康・メンタルヘルスの状態を把握している。また保健・医療・福祉に関連するキャリア教育においても重要な連携相手となる。"},{"c":"第8章","q":"「スクールカウンセラー」とコーディネーターの関係として正しいものはどれか。","o":["A. 競合する存在","B. 生徒のメンタルヘルス面ではSCが専門的に対応し、コーディネーターはSCの情報を参考にしながらプログラムに配慮する","C. コーディネーターはSCの業務を引き受ける","D. SCとの連携は法律で禁止されている"],"a":1,"e":"スクールカウンセラー（SC）は生徒のメンタルヘルスの専門家。コーディネーターはSCと情報共有しながら、心理的配慮が必要な生徒に対応したプログラム調整ができる。"},{"c":"第8章","q":"校種別の特徴として「小学校」に最も当てはまる記述はどれか。","o":["A. 教科担任制が中心で、専門性の高い教員が多い","B. 学級担任制が中心で、担任が多くの教科を受け持つ","C. 選択科目が多く生徒の主体的な学習が中心","D. 職業訓練が教育の中心となっている"],"a":1,"e":"小学校は学級担任制が基本で、担任が国語・算数など多くの教科を受け持つ。これは中学校・高校の教科担任制とは異なる特徴。"},{"c":"第8章","q":"「中学校」の組織的特徴として最も適切なものはどれか。","o":["A. 学級担任制で担任が全教科を担当","B. 教科担任制が中心で、各教員が専門教科を担当","C. 学年制度がなく完全な個別進級","D. 校長が全授業を担当する"],"a":1,"e":"中学校は小学校の学級担任制とは異なり、教科担任制が中心。各教員が自分の専門教科を複数のクラスで担当する形態が基本。"},{"c":"第8章","q":"「高校」の特徴としてキャリア教育に特に関連するものはどれか。","o":["A. 学級担任制が中心","B. 普通科・専門学科・総合学科など多様な学科があり、生徒の進路の多様性に対応したキャリア教育が必要","C. 学習指導要領が適用されない","D. 全員が同じ進路を目指す"],"a":1,"e":"高校は普通科・工業・農業・商業・看護・総合学科など多様な学科があり、進学・就職・専門職など進路の幅も広い。多様な生徒の実態に応じたキャリア教育が必要。"},{"c":"第8章","q":"「学校の年間行事・スケジュール」をコーディネーターが把握する必要がある理由はどれか。","o":["A. スケジュールを管理する役割があるから","B. 学校の忙しい時期・行事と重複しない形でプログラムを企画するため","C. 行事を廃止する提案をするため","D. 保護者への連絡に使うため"],"a":1,"e":"学校には運動会・文化祭・定期試験・進路行事など年間を通じたスケジュールがある。これを把握してプログラムの時期・内容を調整することがコーディネーターの重要な仕事。"},{"c":"第8章","q":"「特別支援学校」でのキャリア教育の特徴として正しいものはどれか。","o":["A. 学習指導要領が適用されないためキャリア教育は行わない","B. 一人ひとりの特性・能力・将来目標に応じた個別の指導計画に基づくキャリア発達支援","C. 職業訓練のみを行う","D. 支援学校では進路を決める必要がない"],"a":1,"e":"特別支援学校では個別の指導計画（IEP）に基づき、一人ひとりの障害の状態・特性・能力に応じたキャリア発達支援を丁寧に行うことが重要。"},{"c":"第8章","q":"「インクルーシブ教育」の観点からコーディネーターが配慮すべきことはどれか。","o":["A. 障害のある生徒はキャリア教育のプログラムから除外する","B. 多様な特性・ニーズを持つ全ての生徒が参加できるよう、プログラムの設計・環境を配慮する","C. 全員に全く同じプログラムを提供する","D. 障害のある生徒には別の教員が全て対応する"],"a":1,"e":"インクルーシブ教育の観点から、障害の有無にかかわらず全ての生徒がキャリア教育プログラムに参加できるよう、内容・方法・環境の合理的配慮が必要。"},{"c":"第8章","q":"「学校への初期アプローチ」としてコーディネーターが心がけることはどれか。","o":["A. いきなり授業を見学させてもらう","B. 校長・教頭に挨拶し、学校の状況・ニーズを丁寧に聞きながら関係を構築する","C. 教員に直接コンタクトしてプログラムを売り込む","D. 保護者会に参加して意見を述べる"],"a":1,"e":"学校への初期アプローチは管理職（校長・教頭）への礼儀正しい挨拶から始め、学校の状況・課題・ニーズを丁寧に聞きながら信頼関係を徐々に構築することが基本。"},{"c":"第8章","q":"教員業務の理解においてコーディネーターが認識すべき最重要点はどれか。","o":["A. 教員は空き時間が多く外部協力者の対応に常に余裕がある","B. 教員は多忙であり、コーディネーターの関わりが教員の負担を増やさないよう配慮が必要","C. 教員との連絡は必ずメールで行い直接訪問は避ける","D. 教員の意見より保護者の意見を優先する"],"a":1,"e":"教員は多岐にわたる業務で多忙。コーディネーターは教員の負担を減らす存在でなければならず、関わり方・タイミングへの配慮が不可欠。"},{"c":"第8章","q":"「外国籍・帰国子女の生徒」へのキャリア教育支援として適切なものはどれか。","o":["A. キャリア教育の対象外にする","B. 多文化的背景を強みとして捉え、文化的多様性を尊重した個別の支援を行う","C. 日本の慣習に完全に同化させることを目標にする","D. 外国人向けの特別な学校に移ることを勧める"],"a":1,"e":"外国籍・帰国子女の生徒には多文化的背景という強みがある。文化的多様性を尊重し、日本語支援も含めた個別の配慮を持ったキャリア教育支援が重要。"},{"c":"第9章","q":"「幼児期」のキャリア発達の特徴として最も適切なものはどれか。","o":["A. 職業の知識を暗記する時期","B. 身近な大人の働く姿を見て、働くことへの基礎的なイメージ・好奇心が芽生える時期","C. 将来の職業を決定する時期","D. 社会のルールを暗記する時期"],"a":1,"e":"幼児期は身近な大人（親・保育士・地域の人）の働く姿を見て「働くって何だろう」という好奇心・基礎的なイメージが芽生える重要な時期。"},{"c":"第9章","q":"「小学校低学年」のキャリア発達の課題として最も適切なものはどれか。","o":["A. 将来の職業を具体的に決める","B. 身近な人・仕事・地域への興味関心を広げ、自己と社会の基礎的な理解を深める","C. 高校受験に向けた準備","D. 英語・プログラミングの習得"],"a":1,"e":"小学校低学年のキャリア発達課題は、身近な人・仕事・地域への関心を広げ、自己と社会についての基礎的な理解を育てること。"},{"c":"第9章","q":"「小学校高学年」のキャリア発達の特徴として最も適切なものはどれか。","o":["A. 中学校受験のみが目標","B. 自己の役割意識が高まり、働くことへの関心や体験的な理解が深まる時期","C. 職業の知識のみを学ぶ","D. 大人と同等の職業選択が求められる"],"a":1,"e":"小学校高学年になると自己の役割意識が芽生え、職場体験的な活動や職業人との交流を通じて「働くとはどういうことか」を体験的に理解できるようになる。"},{"c":"第9章","q":"「中学校段階」のキャリア発達の核心として最も適切なものはどれか。","o":["A. 特定の職業技術を習得する","B. 自己の能力・適性への関心と将来の生き方を考え始め、職場体験などリアルな体験が有効な時期","C. 大学入試の準備を始める","D. 職業体験は中学生には難しすぎる"],"a":1,"e":"中学校段階は「自分は何が得意か・好きか」「どう生きたいか」を考え始める重要な時期。職場体験などのリアルな体験が自己理解と職業観の形成に有効。"},{"c":"第9章","q":"「高校段階」のキャリア発達において最も重要なことはどれか。","o":["A. 全員が大学に進学する準備","B. 進路選択・将来設計に向けた主体的な自己探求と社会参加への準備","C. 職業技術の取得のみ","D. 就職活動の書類作成の練習"],"a":1,"e":"高校段階では進路選択・将来設計に向けた自己探求と、社会人として必要な力・態度の育成が重要。大学進学・就職など多様な進路に対応したキャリア教育が必要。"},{"c":"第9章","q":"「思春期・青年期」の心理的特徴としてキャリア教育で配慮すべきことはどれか。","o":["A. 自己同一性（アイデンティティ）の確立に向けた模索・揺れを理解し、安心して探索できる環境を提供する","B. 感情の不安定さを完全に排除する","C. 全員が同じ方向を目指すよう統一する","D. 自己探索を避け進路を早期に固定させる"],"a":0,"e":"思春期・青年期はアイデンティティ確立に向けた模索・揺れ・試行錯誤が特徴。この過程を否定せず、安心して自己探索できる環境と支援がキャリア教育に必要。"},{"c":"第9章","q":"「発達障害のある生徒」へのキャリア教育的支援として最も適切なものはどれか。","o":["A. キャリア教育の対象外にする","B. 個々の特性・強みを理解し、合理的配慮のもとで社会参加・就労に向けたキャリア発達支援を行う","C. 通常のプログラムを全く変えずに参加させる","D. 将来への期待を持たせないことが親切"],"a":1,"e":"発達障害のある生徒にもキャリア教育は重要。個々の特性・強み・課題を把握し、合理的配慮・個別支援計画に基づくキャリア発達支援が必要。"},{"c":"第9章","q":"「不登校の生徒」とキャリア教育の関連として正しいものはどれか。","o":["A. 不登校の生徒はキャリア教育の対象外","B. 不登校の背景を理解し、学校外の支援機関と連携しながら段階的な社会参加・キャリア発達を支援する","C. 不登校解決はキャリア教育と無関係","D. 強制的に学校に登校させることが最善"],"a":1,"e":"不登校の生徒にもキャリア発達支援は重要。背景・ニーズを理解し、教育支援センター・フリースクール等と連携しながら段階的な社会参加を支援することが必要。"},{"c":"第9章","q":"「自己肯定感の低さ」への対応としてキャリア教育に求められることはどれか。","o":["A. 競争に勝つことで自信をつけさせる","B. 成功体験・認められる経験を通じて、自己の価値・強みへの気づきを促す活動設計","C. 自己肯定感は個人の問題でキャリア教育では扱わない","D. 他者と比較させて刺激を与える"],"a":1,"e":"自己肯定感が低い生徒には、成功体験・他者から認められる経験・自分の強みへの気づきを促す活動が有効。キャリア教育の体験デザインで意図的に創出できる。"},{"c":"第9章","q":"「保護者との連携」がキャリア教育に重要な理由はどれか。","o":["A. 保護者がキャリア教育の費用を負担するから","B. 家庭での会話・家族の職業観がキャリア発達に大きな影響を与え、保護者の理解・協力が効果を高めるから","C. 保護者がコーディネーターを評価するから","D. 保護者の意見のみに従ってプログラムを組むため"],"a":1,"e":"子どものキャリア発達には家庭での会話・保護者の職業観・生き方観が大きく影響する。保護者の理解と協力を得ることでキャリア教育の効果が家庭にも広がる。"},{"c":"第9章","q":"「キャリアカウンセリング」と通常のキャリア教育指導の違いとして正しいものはどれか。","o":["A. 全く同じもの","B. キャリアカウンセリングは個別の生徒の深い内面・課題に向き合う専門的な支援、一般的指導はより集団・授業中心","C. キャリアカウンセリングは教員のみが行える","D. キャリアカウンセリングはコーディネーターの主要業務"],"a":1,"e":"キャリアカウンセリングは個別の生徒の内面・悩み・課題に向き合う専門的支援で、資格を持ったカウンセラー等が行う。コーディネーターは専門家と連携する役割。"},{"c":"第9章","q":"「スポーツ・芸術分野を志す生徒」へのキャリア教育として適切なものはどれか。","o":["A. プロになれる保証がないため夢を断念させる","B. 夢を追う姿勢を尊重しつつ、多様なキャリアの可能性を視野に持つ力を育む","C. スポーツ・芸術はキャリア教育の対象外","D. 一般の就職のみを目標として指導する"],"a":1,"e":"夢を持つ生徒の意欲・主体性は大切にしながら、プロ以外の多様なキャリアパスも視野に持てるよう幅広い視点を育てることが大切。断念を強制しない。"},{"c":"第9章","q":"「学習意欲の低下」を抱える生徒へのキャリア教育的アプローチとして最も適切なものはどれか。","o":["A. 強制的に勉強させる","B. 学ぶことと将来・自分の夢・地域の課題をつなぎ、学習の意味・目的を実感させる","C. 学習意欲が低い生徒はキャリア教育の対象外","D. テストの点数向上のみに集中させる"],"a":1,"e":"学習意欲が低い生徒には「なぜ学ぶのか」という問いに答える必要がある。学びと自分の将来・社会とのつながりを実感させるキャリア教育的アプローチが有効。"},{"c":"第9章","q":"「キャリア発達の段階」を理解する意義として最も適切なものはどれか。","o":["A. 生徒の進路を早期に決定するため","B. 各発達段階に適したプログラム・支援を提供し、無理なくキャリア発達を促すため","C. 学力の高い生徒を優先的に支援するため","D. 将来の職業を小学校段階で決めさせるため"],"a":1,"e":"発達段階を理解することで、その段階の子どもに最適な目標・内容・方法のプログラムを設計でき、無理なく自然なキャリア発達を支援できる。"},{"c":"第10章","q":"学習指導要領とは何か、最も正確な説明はどれか。","o":["A. 各学校が独自に作成するカリキュラム計画","B. 国が定めた教育課程の基準で、全国の学校が従うべき教育の大綱","C. 文部科学省職員が使用する内部参考資料","D. 都道府県ごとに異なる独自の教育方針"],"a":1,"e":"学習指導要領は文部科学省が告示する法的拘束力のある教育課程の基準。全国の学校はこれに従ってカリキュラムを編成する。"},{"c":"第10章","q":"「生きる力」の三要素として正しいものはどれか。","o":["A. 確かな学力・豊かな心・健やかな体","B. 知識・技能・思考力","C. 自己理解・課題対応・キャリアプランニング","D. 主体性・多様性・協働性"],"a":0,"e":"「生きる力」は確かな学力（知）・豊かな心（徳）・健やかな体（体）の三要素から構成される。"},{"c":"第10章","q":"「新学習指導要領の三本柱」として正しいものはどれか。","o":["A. 知識・技能／思考力・判断力・表現力等／学びに向かう力・人間性等","B. 読み・書き・算盤","C. 自律・協調・創造","D. 主体性・多様性・協働性"],"a":0,"e":"新学習指導要領は全ての教科・活動を通じて「知識・技能」「思考力・判断力・表現力等」「学びに向かう力・人間性等」の三本柱で資質・能力を育成する。"},{"c":"第10章","q":"70年ぶりの大改訂とされた学習指導要領が告示されたのはいつか。","o":["A. 平成10年（1998年）","B. 平成20年（2008年）","C. 平成29年・30年（2017年・2018年）","D. 令和3年（2021年）"],"a":2,"e":"平成29・30年に告示された学習指導要領は約70年ぶりの大改訂とされ、「主体的・対話的で深い学び」などが盛り込まれた。"},{"c":"第10章","q":"「アクティブ・ラーニング（主体的・対話的で深い学び）」が強調される理由はどれか。","o":["A. 授業時間を短縮するため","B. 知識の暗記だけでなく、思考・判断・表現・協働の力を育てるため","C. 教員の負担を軽減するため","D. テストの点数を上げるため"],"a":1,"e":"アクティブ・ラーニングは知識の受動的暗記を超え、思考・判断・表現・協働を通じた深い学びを実現する。変化する社会で活きる力の育成に不可欠。"},{"c":"第10章","q":"「カリキュラム・マネジメント」の説明として正しいものはどれか。","o":["A. カリキュラムを毎年変更し続けること","B. 学校が教育目標を実現するため、教育内容の組織的な配列・評価・改善を行うこと","C. 文部科学省がカリキュラムを一括管理すること","D. 教員が個人で授業計画を立てること"],"a":1,"e":"カリキュラム・マネジメントは学校が目標達成のために教科横断的・組織的に教育内容を配列・評価・改善するプロセス。新学習指導要領で明示された概念。"},{"c":"第10章","q":"「特別活動（学校行事）」とキャリア教育の関連として正しいものはどれか。","o":["A. 学校行事はキャリア教育と無関係","B. 文化祭・運動会・修学旅行などの学校行事が協働・挑戦・達成などのキャリア発達経験を提供する","C. 学校行事はキャリア教育の代替になる","D. 特別活動は受験勉強の妨げになるだけ"],"a":1,"e":"文化祭（企画・協働・発表）・運動会（目標・挑戦・チームワーク）・修学旅行（自律・社会理解）など学校行事はキャリア発達に関わる豊かな体験の場。"},{"c":"第10章","q":"「総合的な学習の時間」とキャリア教育の関係として正しいものはどれか。","o":["A. 総合的な学習の時間はキャリア教育とは無関係","B. 総合的な学習の時間はキャリア教育と深く関連し、探究的な学習を通じてキャリア発達を促す機会となる","C. キャリア教育は総合的な学習の時間のみで実施される","D. 総合的な学習の時間は廃止されキャリア教育に置き換えられた"],"a":1,"e":"総合的な学習の時間は探究的な学びを通じてキャリア発達を促す重要な機会。ただしキャリア教育は特定の時間だけでなく教育活動全体を通じて行われる。"},{"c":"第10章","q":"「道徳の教科化（特別の教科 道徳）」で変わったこととして正しいものはどれか。","o":["A. 道徳の授業がなくなった","B. 検定教科書の使用・数値以外による評価など、教科として位置付けられ充実が図られた","C. 道徳の成績が入試に使われる","D. 道徳は週5時間になった"],"a":1,"e":"道徳の教科化により、検定教科書の使用・数値によらない質的な評価・道徳科としての目標設定など、より体系的な指導が求められるようになった。"},{"c":"第10章","q":"「学習指導要領が示す学校教育の目標」として最も核心的なものはどれか。","o":["A. 大学進学率の向上","B. 生きる力を育み、自立した人間として社会に参加できる資質・能力の育成","C. 国際競争力の向上","D. 就職率の向上"],"a":1,"e":"学習指導要領が示す学校教育の究極の目標は「生きる力」の育成。自立した人間として社会に参加し自分らしく生きる力を育てること。"},{"c":"第10章","q":"「社会に開かれた教育課程」という考え方の意味はどれか。","o":["A. 学校外に授業を公開すること","B. 社会との接続を意識し、社会で生きるために必要な資質・能力を育てる教育課程を作ること","C. SNSを教育に活用すること","D. 地域の人が自由に学校に入れること"],"a":1,"e":"「社会に開かれた教育課程」は学校が社会と連携・協働しながら、社会で必要な資質・能力の育成を意識した教育課程を作ること。キャリア教育との親和性も高い。"},{"c":"第10章","q":"「プログラミング教育」が学習指導要領に組み込まれた意義はどれか。","o":["A. 将来全員がプログラマーになるため","B. 論理的思考（プログラミング的思考）の育成と情報活用能力の向上","C. ITの専門職を増やすため","D. ゲーム開発を学ぶため"],"a":1,"e":"プログラミング教育の本質は特定言語の習得ではなく、プログラミング的思考（論理的・体系的な思考）と情報活用能力の育成。変化する社会に対応する力の一つ。"},{"c":"第10章","q":"「学習指導要領の改訂周期」として最も正しい説明はどれか。","o":["A. 毎年改訂される","B. 概ね10年ごとに社会変化・教育課題に対応して改訂される","C. 20年に1回のみ改訂される","D. 国会の決定があれば随時改訂される"],"a":1,"e":"学習指導要領は概ね10年ごとに改訂される。社会の変化・教育課題・研究の進展に対応して見直される。"},{"c":"第10章","q":"「特別活動のホームルーム活動」とキャリア教育の具体的な関連はどれか。","o":["A. ホームルームはキャリア教育と無関係","B. 進路学習・自己理解・将来設計など、キャリア教育の中核的な内容をホームルームで扱える","C. ホームルームは清掃・係活動のみ","D. ホームルームは教員不在で実施する"],"a":1,"e":"高校のホームルーム活動では進路学習・自己分析・将来設計・職業調べなど、キャリア教育の核心的な内容を扱うことができる。新学習指導要領でも明示されている。"},{"c":"第11章","q":"「基礎的・汎用的能力」の4つとして正しいものはどれか。","o":["A. 人間関係形成・社会形成能力、自己理解・自己管理能力、課題対応能力、キャリアプランニング能力","B. 読解力、計算力、論理的思考力、創造力","C. コミュニケーション能力、リーダーシップ、チームワーク、プレゼンテーション力","D. 自己PR力、面接力、履歴書作成力、職場マナー"],"a":0,"e":"基礎的・汎用的能力は①人間関係形成・社会形成能力②自己理解・自己管理能力③課題対応能力④キャリアプランニング能力の4つ。"},{"c":"第11章","q":"「21世紀型能力」として文科省等が示した三層構造として正しいものはどれか。","o":["A. 基礎力・思考力・実践力","B. 知識・技能・態度","C. 読み・書き・算盤","D. 自律・協調・創造"],"a":0,"e":"21世紀型能力として基礎力（学ぶ力）・思考力・実践力の三層構造が示されている。"},{"c":"第11章","q":"「はぐくみたい力」を学校・地域・保護者が共有する意義はどれか。","o":["A. 全員が同じことを覚えるため","B. 共通のビジョンがあることで、異なる場・活動が連動して子どものキャリア発達を支えられるから","C. 文部科学省への報告のため","D. 評価の基準を統一するため"],"a":1,"e":"「はぐくみたい力」の共有により学校・家庭・地域が同じビジョンの下に連携。バラバラな取り組みが一貫した方向性を持ち、子どものキャリア発達を多面的に支えられる。"},{"c":"第11章","q":"「変わる大学入試。めざすこととは？」に関して最も適切な説明はどれか。","o":["A. 入試改革はキャリア教育とは無関係","B. 大学入試の変化（記述式・主体性評価等）はキャリア教育で育む力と密接に関連する","C. 入試改革は受験指導の強化のみを意味する","D. 大学入試の変化はキャリア教育を不要にする"],"a":1,"e":"大学入試改革（記述式問題の導入・主体性評価・多面的評価等）は、思考力・表現力・主体性などキャリア教育でめざす力と重なる。"},{"c":"第11章","q":"「非認知能力」とキャリア教育の関連として最も適切なものはどれか。","o":["A. テストで測れる能力のみが重要","B. やり抜く力・自己調整・協働性など、テストで測りにくい非認知能力がキャリア発達に大きく影響する","C. 非認知能力はキャリアと無関係","D. 非認知能力は生まれつき固定されており育てられない"],"a":1,"e":"グリット（やり抜く力）・自己効力感・協働性・共感力などの非認知能力は、キャリア発達・職業的成功・人間関係に大きく影響し、キャリア教育で育てる重要な対象。"},{"c":"第11章","q":"「知識基盤社会」という言葉がキャリア教育に示す含意はどれか。","o":["A. 知識の暗記量が最も重要","B. 知識を活用・創造する力・継続的な学習能力がキャリア発達の鍵","C. 知識は不要でスキルだけが重要","D. AIが全ての知識を代替するから教育は不要"],"a":1,"e":"知識基盤社会では単なる知識の量より、知識を批判的に読み解き・活用し・新たな価値を生み出す力と、継続的に学び続ける力がキャリアの核となる。"},{"c":"第11章","q":"「多様な能力観」をキャリア教育に活かす意義はどれか。","o":["A. 全員が同一の能力を持つよう揃える","B. 一人ひとりの異なる強み・能力に気づかせ、自己理解と自己効力感を高める","C. 能力の低い生徒を早期に識別する","D. 学力の高い生徒のみを対象にする"],"a":1,"e":"多様な能力観（多重知能理論等）をキャリア教育に活かすことで、学力だけでなく様々な強みを持つ子ども一人ひとりの自己理解と自己効力感を高められる。"},{"c":"第11章","q":"「コンピテンシー」とキャリア教育の関連として正しいものはどれか。","o":["A. コンピテンシーは就職試験の点数","B. 高い成果を生む行動特性としてのコンピテンシーの概念が、はぐくみたい力の参考枠組みになる","C. コンピテンシーは大学院生のみに必要","D. コンピテンシーは運動能力を指す"],"a":1,"e":"コンピテンシー（高成果者の行動特性）の概念は、企業・社会が求める能力像の参考として、キャリア教育で「はぐくみたい力」を設計する際の参考枠組みになる。"},{"c":"第11章","q":"「教育には目指すべき目標が必要」とされる理由として最も適切なものはどれか。","o":["A. 文部科学省の規則で義務付けられているから","B. 目標がなければ何を育てようとしているのかが不明確になり、教育活動の効果が見えなくなるから","C. 生徒を競争させるための基準が必要だから","D. 保護者への説明責任のためだけ"],"a":1,"e":"教育目標は「何を育てたいのか」を明確にし、教育活動に方向性を与える。目標なき教育は行き当たりばったりになり、効果測定も困難になる。"},{"c":"第11章","q":"「はぐくみたい力の重要性」を発信する際のポイントとして最も適切なものはどれか。","o":["A. 専門的な用語を使って難しく説明する","B. 具体的な子どもの姿・エピソードを用いてイメージが伝わる形で共有する","C. 文部科学省の資料をそのまま配布する","D. テストの点数との相関で説明する"],"a":1,"e":"「はぐくみたい力」を関係者に発信する際は抽象的な言葉でなく、具体的な子どもの姿・エピソード・場面のイメージで伝えることで共感・理解が得やすい。"},{"c":"第12章","q":"「効果のあるキャリア教育プログラムの要件」として最も適切なものはどれか。","o":["A. 有名人・著名人の講演を多く取り入れること","B. 事前・事後学習を含む体系的な設計で、子どもの学びと発達を促すこと","C. 予算をできるだけ多く使うこと","D. 毎年必ず同じプログラムを繰り返すこと"],"a":1,"e":"効果のあるキャリア教育プログラムの要件として、事前・事後学習を含む体系的設計、子どもの発達段階への適応、振り返りと学びの定着などが挙げられる。"},{"c":"第12章","q":"キャリア教育の事例として「職場体験学習」の効果的な実施のポイントはどれか。","o":["A. 体験先の選定のみが重要で事前・事後学習は不要","B. 事前学習・体験・事後学習のサイクルで学びを深め、振り返りを重視する","C. できるだけ多くの職場を短時間で体験させる","D. 体験中は教員が常に同行し指導する"],"a":1,"e":"職場体験は体験そのものだけでなく、事前に目標設定・準備をし、体験後に振り返り・学びの言語化を行うサイクルが効果を高める。"},{"c":"第12章","q":"効果的なキャリア教育事例に共通する要素として最も適切なものはどれか。","o":["A. 多額の予算と有名な外部講師","B. 子どもの主体性・参加・振り返りを重視した設計","C. 短時間で多くのコンテンツを詰め込む","D. 教員が一方的に伝える講義形式"],"a":1,"e":"効果的な事例に共通するのは、子どもが主体的に参加し、体験を振り返り、学びを深める設計。"},{"c":"第12章","q":"「様々な事例からプログラムの在り方を学ぶ」ことの目的として最も適切なものはどれか。","o":["A. 他校の事例をそのままコピーして使うため","B. 多様な実践から自校・自地域に合ったプログラムを創造するヒントを得るため","C. 文部科学省に優良事例として報告するため","D. 保護者に成果を見せるため"],"a":1,"e":"事例研究はコピーのためではなく、多様な実践から学び自校・自地域の状況に合わせたプログラム開発の創造的なヒントを得るもの。"},{"c":"第12章","q":"「職業人によるキャリア教育講話」の効果的な実施ポイントはどれか。","o":["A. できるだけ有名な職業人を呼ぶ","B. 生徒が事前に関心・疑問を整理し、話を聞いた後に振り返り・深化させる設計","C. 長時間話してもらう","D. 同じ職業人を毎年呼ぶ"],"a":1,"e":"職業人講話は事前に生徒が関心や疑問を整理し、講話後に振り返り・考察・アウトプットまで行う設計で効果が高まる。聞きっぱなしにしないことが重要。"},{"c":"第12章","q":"「職場体験」と「インターンシップ」の違いとして最も適切なものはどれか。","o":["A. 全く同じものを指す","B. 職場体験は主に中学生対象の短期体験、インターンシップは高校生以上の長期・専門的体験が多い","C. インターンシップは小学生のみ","D. 職場体験は企業に謝礼が必要だがインターンシップは不要"],"a":1,"e":"職場体験は主に中学生が数日間で実施する体験的活動。インターンシップは高校・大学生が専門的テーマで行う、より長期・深度の高い体験。"},{"c":"第12章","q":"「子どもが発信・表現する機会」をキャリア教育に組み込む意義はどれか。","o":["A. 発表の練習のみが目的","B. 体験や学びをアウトプットすることで学習が深化し、表現力・自己効力感・キャリア意識が高まる","C. 保護者に見せるためのパフォーマンス","D. 評価を数値化するため"],"a":1,"e":"発表・表現・発信は受動的な学びを能動的に転換する契機。体験を言語化・共有する過程で学びが深化し、表現力・自己効力感・コミュニケーション力が育まれる。"},{"c":"第12章","q":"「地域探究学習」をキャリア教育として実施する際の効果として適切なものはどれか。","o":["A. 学力テストの点数向上のみ","B. 地域の課題を主体的に探究する中で課題発見・解決力・キャリアプランニング能力などが育まれる","C. 観光ガイドの育成","D. 地域の税収増加"],"a":1,"e":"地域探究学習は地域の課題を自分事として発見・調査・提案するプロセスを通じて、課題対応能力・キャリアプランニング能力など基礎的・汎用的能力を育む。"},{"c":"第12章","q":"「地域の課題解決型学習（PBL）」の特徴として最も適切なものはどれか。","o":["A. 教員が解決策を決めて生徒に実行させる","B. 生徒が主体的に課題を設定・調査・解決策立案・実行・発表するプロジェクト型の学び","C. 定期試験の代替として使う","D. 保護者が設定した課題を生徒が解く"],"a":1,"e":"PBL（プロジェクト型学習）は生徒が課題設定から解決策実行・発表まで主体的に関わる学び。課題対応能力・協働力・キャリアプランニング能力が統合的に育まれる。"},{"c":"第12章","q":"「キャリア教育プログラム」が単発イベントに終わらないために必要なことはどれか。","o":["A. 毎月大規模なイベントを開催する","B. 年間を通じた計画的・系統的な位置付けと、事前・事後学習による学びの定着","C. 有名人を多数呼ぶ","D. 保護者にすべての活動を参観させる"],"a":1,"e":"単発イベントでは学びが定着しにくい。年間を通じた計画的配置、事前・事後学習との連動、学びを積み上げる仕組みが必要。"},{"c":"第13章","q":"「プログラム開発とは何か」について最も正確な説明はどれか。","o":["A. 既存のプログラムをそのままコピーして使うこと","B. 教育目標・対象・内容・方法・評価を系統的に設計し実施可能な形にすること","C. コンピュータのソフトウェアを開発すること","D. 授業計画（学習指導案）を作成すること"],"a":1,"e":"プログラム開発とは、目標・対象・内容・方法・評価などを体系的に設計し、実施可能な形にするプロセス全体を指す。"},{"c":"第13章","q":"プログラム開発の流れとして正しい順序はどれか。","o":["A. 実施→評価→目標設定→設計","B. 目標設定→調査・分析→設計→実施→評価・改善","C. 評価→設計→実施→目標設定","D. 設計→実施→目標設定→評価"],"a":1,"e":"プログラム開発の基本的な流れは①目標設定②現状調査・ニーズ分析③プログラム設計④実施⑤評価・改善（PDCAサイクル）。"},{"c":"第13章","q":"「企画提案書」に含まれるべき要素として最も適切なものはどれか。","o":["A. 目的・対象・内容・方法・スケジュール・予算・評価方法","B. コーディネーターの個人履歴のみ","C. 過去の失敗事例のリスト","D. 競合他社の批判"],"a":0,"e":"企画提案書には目的・ねらい、対象（学年・人数等）、内容・プログラム構成、実施方法、スケジュール、必要予算、評価方法などを明記する。"},{"c":"第13章","q":"プログラム開発における「PDCAサイクル」の「C」は何を意味するか。","o":["A. Create（創造）","B. Check（評価・確認）","C. Change（変更）","D. Continue（継続）"],"a":1,"e":"PDCAのCはCheck（評価・確認）。Plan（計画）→Do（実施）→Check（評価）→Action（改善）のサイクルを回すことで継続的な質の向上を図る。"},{"c":"第13章","q":"キャリア教育プログラムの「継続性」を確保するために重要なことはどれか。","o":["A. 担当者が変わっても同じプログラムが実施できるよう記録・マニュアル化する","B. 必ず同一の担当者が毎年実施する","C. 一度成功したプログラムは変更しない","D. 予算を固定して変動させない"],"a":0,"e":"担当者が変わっても継続できるよう、プログラムの記録・マニュアル化・引継ぎ体制の整備が継続性確保に重要。"},{"c":"第13章","q":"「プログラムの対象を明確にする」ことの重要性はどれか。","o":["A. 費用を削減するため","B. 対象の発達段階・実態・ニーズに合わせた内容・方法・難易度の設計ができるから","C. 参加者を制限するため","D. 行政への報告書のため"],"a":1,"e":"対象（学年・人数・発達段階・特性）を明確にすることで、その子どもたちに最適な内容・方法・難易度・時間配分のプログラムを設計できる。"},{"c":"第13章","q":"「プログラムの「量」より「質」」を重視すべき理由はどれか。","o":["A. 予算が少ないから","B. 体験量が多くても振り返り・学びの深化がなければキャリア発達につながらないから","C. 教員の負担を減らすため","D. 生徒が飽きてしまうから"],"a":1,"e":"体験の量より質が重要。多くの体験を詰め込んでも振り返り・意味付け・次への動機につながらなければキャリア発達効果は限定的。深い学びのある質の高いプログラムが価値を持つ。"},{"c":"第13章","q":"「プログラムの記録と共有」の意義として最も適切なものはどれか。","o":["A. 個人の業績をアピールするため","B. 組織の知的資産として蓄積し、引継ぎ・改善・他校への展開に活かすため","C. 行政への義務的な報告のみ","D. 証拠として保管するため"],"a":1,"e":"プログラムの記録・共有は組織の知的資産。担当者が変わっても継続でき、改善の基礎資料となり、他校・他地域への展開の素材にもなる。"},{"c":"第13章","q":"「プログラムを年間計画に位置付ける」ことの意義はどれか。","o":["A. 形式的な書類を作るため","B. 単発で終わらず教育活動全体と有機的につながることで、学びが積み重なりキャリア発達が継続的に促されるから","C. 文部科学省の指示に従うため","D. 担当者の仕事を明確にするため"],"a":1,"e":"年間計画への位置付けにより、プログラムが学年全体の学びの流れと連動。事前・体験・事後のサイクルが機能し、各活動が孤立せず学びが積み重なる。"},{"c":"第13章","q":"「外部資源の活用」においてコーディネーターが注意すべきことはどれか。","o":["A. 外部に全て任せて学校は関与しない","B. 外部資源の強みを活かしながら、学校側が教育目標・事前事後指導の主体性を保つこと","C. 外部資源は無償でなければ使えない","D. 外部資源の活用は教育委員会が全て管理する"],"a":1,"e":"外部資源（職業人・企業・NPO）の強みを活かしながら、学校が教育目標の主体性・事前事後指導・学習のつながりの責任を持つことが重要。外部任せにしない。"},{"c":"第13章","q":"「地域固有の課題をテーマにしたプログラム開発」の意義はどれか。","o":["A. 地域の問題を悪化させるリスクがある","B. 子どもの身近な現実から課題を発見・探究することで学習の動機・主体性・地域への関心が高まる","C. 全国共通のテーマで学ぶ方が有益","D. 地域の課題は大人が解決すべきで子どもが関わる必要はない"],"a":1,"e":"地域固有の課題（人口減少・産業衰退・自然環境等）を学びのテーマにすることで、子どもが「自分事」として主体的に探究し、地域への関心とキャリア意識が高まる。"},{"c":"第13章","q":"「各種教材の活用方法」において重要なことはどれか。","o":["A. 最新の教材のみを使用し古い教材は廃棄する","B. 教材の特性を理解し、目的・対象・場面に合わせて適切に選択・活用する","C. できるだけ多くの教材を一度に使用する","D. 市販の教材はそのまま使用し改変しない"],"a":1,"e":"教材は種類・特性を理解したうえで、目的・対象（年齢・発達段階）・場面（授業・体験・振り返り等）に合わせて適切に選択・場合によっては改変して活用する。"},{"c":"第14章","q":"「教科学習とキャリア教育」の関係として正しいものはどれか。","o":["A. 教科学習とキャリア教育は無関係である","B. すべての教科の学習内容はキャリア教育と何らかのつながりを持ちうる","C. キャリア教育は教科学習の時間を削減して実施する","D. キャリア教育は理科・社会のみと関連する"],"a":1,"e":"国語・数学・理科・社会など、すべての教科はその内容・学び方を通じてキャリア教育と関連付けられる。"},{"c":"第14章","q":"「国語」とキャリア教育の具体的な関連として最も適切なものはどれか。","o":["A. 国語はキャリア教育と無関係","B. 読む・書く・伝えるの力はキャリアにおける基礎的コミュニケーション能力に直結する","C. 国語は詩の暗記のみ","D. 国語の成績がキャリアを決める"],"a":1,"e":"国語の読解力・表現力・コミュニケーション力はキャリアの全場面で不可欠な基礎的能力。職業人インタビュー記事作成など国語学習とキャリア活動を結ぶ取り組みも有効。"},{"c":"第14章","q":"「社会科」とキャリア教育の関連として最も適切なものはどれか。","o":["A. 社会科は歴史の暗記のみ","B. 社会の仕組み・産業・経済・地理・公民の学びが、社会参加・職業理解・キャリアプランニングの土台になる","C. 社会科はキャリア教育と無関係","D. 社会科の知識は就職に不要"],"a":1,"e":"社会科は社会の仕組み・産業・経済・地域・公民の学びを通じて、社会参加の基盤・職業理解・地域への関心・キャリアプランニングの重要な素地を育てる。"},{"c":"第14章","q":"「体育・保健体育」とキャリア教育の関連として適切なものはどれか。","o":["A. 体育はキャリア教育と全く無関係","B. 健康管理・チームワーク・スポーツを通じた挑戦・達成体験はキャリア発達に通じる","C. 体育は運動能力の向上のみが目的","D. 体育の成績がキャリアに直結する"],"a":1,"e":"体育・保健体育でのチームワーク・粘り強さ・健康管理・挑戦・達成体験は、キャリア発達に必要な人間関係形成能力・課題対応能力・自己管理能力と重なる。"},{"c":"第14章","q":"「家庭科」とキャリア教育の具体的な関連として最も適切なものはどれか。","o":["A. 家庭科はキャリア教育と無関係","B. 食・住・消費生活の学びと、ライフプランニング・家族の在り方・消費者教育がキャリア発達に通じる","C. 家庭科は料理のみ","D. 家庭科は女子のみが学ぶ"],"a":1,"e":"家庭科での食・住・家族・消費生活の学びは、自立した生活者としてのスキルと、家族・ライフプランを含む広い意味でのキャリアプランニングに深く関わる。"},{"c":"第14章","q":"「道徳（特別の教科 道徳）」とキャリア教育の関連として最も適切なものはどれか。","o":["A. 道徳はキャリア教育と全く別の領域","B. よりよく生きることへの探究は自己理解・価値観形成を通じてキャリア発達に貢献する","C. 道徳でキャリアプランを作成する","D. 道徳の時間がキャリア教育の主な実施場所"],"a":1,"e":"道徳はよりよく生きることへの問いを深める教科。自己の価値観・生き方を考える活動はキャリア発達に通じ、キャリア教育との有機的な関連がある。"},{"c":"第14章","q":"「新しい学び」（探究的な学習）とキャリア教育の関係として正しいものはどれか。","o":["A. 探究的な学習はキャリア教育の妨げになる","B. 探究的な学習を通じて課題発見・解決の力が育ち、キャリアプランニング能力にもつながる","C. 探究的な学習は大学院生のみに適している","D. キャリア教育は探究的な学習を否定する"],"a":1,"e":"探究的な学習（問いを立て、調べ、考え、まとめ、発信する）を通じて課題対応能力・キャリアプランニング能力など基礎的・汎用的能力が育まれる。"},{"c":"第14章","q":"「生徒会活動」とキャリア教育の関連として最も適切なものはどれか。","o":["A. 生徒会活動はキャリア教育と無関係","B. 民主的な組織の一員として主体的に参加・責任を果たす体験が人間関係形成能力・自己管理能力を育む","C. 生徒会役員だけに関係する","D. 生徒会活動は成績と関係ない"],"a":1,"e":"生徒会活動は学校という社会の中で民主的に意見を表明し、役割を果たし、目標に向けて協働する体験。人間関係形成・自己管理・課題対応能力が実践的に育まれる。"},{"c":"第14章","q":"「ボランティア活動」とキャリア教育の関連として適切なものはどれか。","o":["A. ボランティアはキャリアと無関係","B. 社会への貢献・他者への奉仕を通じて社会性・利他的精神・社会参加意識が育まれる","C. ボランティアは成績に有利なだけ","D. ボランティアは大人がすることで子どもには不要"],"a":1,"e":"ボランティア活動は社会の一員として貢献する体験を通じて、社会性・利他的精神・社会参加意識・人間関係形成能力などのキャリア発達要素を育む。"},{"c":"第14章","q":"「教科横断的なキャリア教育」の実践例として最も適切なものはどれか。","o":["A. 全ての教科を別々に独立して教える","B. 社会科の地域産業学習と国語のインタビュー記事作成、総合の探究活動を連動させる","C. 一つの教科でキャリア教育の全てを行う","D. キャリア教育を教科から切り離して実施する"],"a":1,"e":"教科横断的実践として、社会科（地域産業）×国語（インタビュー・報告文作成）×総合（探究・発表）を連動させることで、多面的な力の育成と深い学びが実現する。"},{"c":"第14章","q":"「総合的な探究の時間（高校）」と「総合的な学習の時間（小中）」の違いとして正しいものはどれか。","o":["A. 全く同じ","B. 高校の「探究」は自己の在り方生き方と関連付けながらより深い探究を行うことが求められる","C. 小中の方が難しい","D. 高校では廃止された"],"a":1,"e":"高校の「総合的な探究の時間」は、小中の「総合的な学習の時間」を発展させ、自己の在り方・生き方との関連を深めながら探究する高校段階固有の設定。"},{"c":"第14章","q":"教科学習の時間と総合的な学習の時間の違いとして正しいものはどれか。","o":["A. 教科学習は探究的な学習、総合的な学習は基礎知識の習得が目的","B. 教科学習は各教科の目標に沿い、総合的な学習は横断的・探究的な学習が中心","C. 総合的な学習の時間は受験対策に使う時間","D. 両者に違いはなく同一の目的を持つ"],"a":1,"e":"教科学習は各教科固有の見方・考え方・目標に基づく。総合的な学習は教科横断的・探究的な学習を通じた汎用的な力の育成が中心。"},{"c":"第15章","q":"「効果測定の目的」として最も適切なものはどれか。","o":["A. コーディネーターの業務評価のみ","B. プログラムの効果を把握し改善に活かすとともに、関係者への説明責任を果たすこと","C. 生徒を点数で序列化すること","D. 文部科学省への義務的な報告のみ"],"a":1,"e":"効果測定の目的はプログラムの効果把握・改善（内部的目的）と、保護者・地域・行政など関係者への説明責任（外部的目的）の両面がある。"},{"c":"第15章","q":"「効果測定の手順」として正しい順序はどれか。","o":["A. 実施→測定→目標設定→分析","B. 目標・評価指標の設定→実施前調査→プログラム実施→実施後調査→分析・考察→改善","C. 実施→改善→再実施→評価","D. 予算確保→実施→報告→評価指標設定"],"a":1,"e":"効果測定の基本手順は①目標・評価指標設定②事前調査③プログラム実施④事後調査⑤比較分析・考察⑥改善策立案。"},{"c":"第15章","q":"「ポートフォリオ」を使った効果測定の説明として正しいものはどれか。","o":["A. 単一のテストで瞬間的な能力を測定する方法","B. 学習成果物・振り返りシートなどを継続的に蓄積し、成長の過程を把握する方法","C. 教員が一方的に評価するための記録","D. 財務諸表の一種"],"a":1,"e":"ポートフォリオは学習成果・体験記録・振り返りなどを時系列で蓄積し、子どもの成長プロセスを可視化する評価方法。"},{"c":"第15章","q":"「ルーブリック」の説明として最も正確なものはどれか。","o":["A. 正誤のみで判定する二択評価シート","B. 評価基準と達成レベルを明示した表で、到達度を多段階で評価する絶対評価の指針","C. 相対評価（偏差値）のための計算方法","D. テストの採点を自動化するソフトウェア"],"a":1,"e":"ルーブリックは評価基準（何を評価するか）と達成レベル（どの程度達成されているか）を複数段階で明示した評価表。絶対評価・パフォーマンス評価に適している。"},{"c":"第15章","q":"「授業観察記録を活用したカンファレンス」の目的として最も適切なものはどれか。","o":["A. 教員の勤務評定を行うため","B. 実際の授業観察をもとに関係者が情報を共有し、プログラムの改善につなげるため","C. 生徒の成績を決定するため","D. 予算配分を決定するため"],"a":1,"e":"カンファレンスでは授業観察の記録をもとに教員・コーディネーターなど関係者が情報・視点を共有し、協働してプログラムの質を高めることが目的。"},{"c":"第15章","q":"「アンケート調査」による定量的な評価の利点として最も適切なものはどれか。","o":["A. 子どもの深い内面を完全に把握できる","B. 多数の対象者から数値化したデータを収集でき、変化の量的把握や比較が容易","C. 質的な変化のみを測定できる","D. 実施コストがゼロである"],"a":1,"e":"アンケートによる定量評価は大人数から数値データを収集でき、事前事後比較・群間比較など統計的分析が可能。"},{"c":"第15章","q":"「効果分析の活用」として最も適切なものはどれか。","o":["A. 分析結果は報告書に書くだけでよい","B. 分析から得た知見をプログラム改善・次年度計画・関係者への説明に積極的に活用する","C. マイナスの結果は隠して良い部分だけ報告する","D. 効果分析は専門家だけが行うもので現場は不要"],"a":1,"e":"効果分析で得られた知見は、プログラムの改善点特定・次年度計画への反映・関係者への説明資料として積極的に活用することが重要。"},{"c":"第15章","q":"「子ども自身による自己評価」の意義として最も適切なものはどれか。","o":["A. 教員の評価を減らすため","B. 自己の変化・成長への気づきが自己効力感と次の学習への動機づけにつながるから","C. 正確な評価は子どもにはできないため不要","D. 法律で自己評価が義務付けられているから"],"a":1,"e":"子ども自身による自己評価は自分の変化・成長・課題への気づきを促し、自己効力感の向上と次の学習・行動への主体的な動機づけにつながる。"},{"c":"第15章","q":"「事前・事後調査による効果測定」の限界として正しいものはどれか。","o":["A. 事前・事後比較は常に正確な効果測定ができる","B. プログラム以外の要因（成熟・他の学習経験等）による変化と区別が難しい場合がある","C. 事前調査が不要な場合がある","D. 事後調査は意味がない"],"a":1,"e":"事前・事後比較は有用だが、変化がプログラムだけでなく成熟・他の学習・社会的出来事など外的要因によるものかもしれない。この限界を理解して解釈する必要がある。"},{"c":"第15章","q":"「質的評価（定性的評価）」の特徴として最も正確なものはどれか。","o":["A. 数値で全てを表現する方法","B. インタビュー・観察・記述など、数値化しにくい変化や深い意味を捉える評価方法","C. 客観性が全くない主観的な評価","D. 統計処理のみを行う方法"],"a":1,"e":"質的評価は数値化しにくい微細な変化・意味・文脈を捉える方法。インタビュー・振り返り記述・行動観察などが含まれる。定量評価とセットで用いると効果的。"},{"c":"第15章","q":"「カンファレンス（事例検討会）」がプログラム改善に有効な理由はどれか。","o":["A. 大人数が集まるだけで改善できる","B. 関係者（教員・コーディネーター等）が観察・体験を持ち寄り、複数視点で課題と改善点を明らかにできるから","C. 会議録が評価書類になるから","D. 行政への義務的な報告の場だから"],"a":1,"e":"カンファレンスでは複数の関係者が観察・記録・体験を持ち寄り、多角的な視点でプログラムの課題と強みを分析できる。一人では気づかない視点が得られる。"},{"c":"第15章","q":"「保護者への効果報告」が重要な理由はどれか。","o":["A. 保護者を安心させるだけのため","B. 保護者の理解と協力を深め、家庭でもキャリアに関する会話・支援が促進されるから","C. 予算増加の要求をするため","D. 行政への義務報告のため"],"a":1,"e":"保護者への効果報告はキャリア教育への理解を深め、「子どもの成長をどう支援するか」という家庭での積極的な関与・会話を促進する効果がある。"},{"c":"第15章","q":"「評価結果を学校全体で共有する」意義として最も適切なものはどれか。","o":["A. 個々の教員の評価を公開するため","B. キャリア教育全体の成果と課題を組織として認識し、学校全体での改善・推進力につなげるため","C. 保護者への情報提供のみ","D. 行政への義務的な報告のため"],"a":1,"e":"評価結果を全教職員で共有することで、学校全体としてキャリア教育の現状と課題を認識し、組織的な改善・推進の原動力となる。"},{"c":"第16章","q":"「プロジェクトマネジメントのエッセンス」として最も重要なものはどれか。","o":["A. できるだけ多くの予算を確保すること","B. 目標・スコープ・スケジュール・リソース・リスクを管理し、目的を達成すること","C. 関係者の人数を増やすこと","D. 実施後の報告書を充実させること"],"a":1,"e":"プロジェクトマネジメントの核心は、目標・スコープ・スケジュール・必要なリソース・想定されるリスクを適切に管理し、目的を達成すること。"},{"c":"第16章","q":"「キャリア教育プロジェクトの流れ」として適切な順序はどれか。","o":["A. 実施→計画→振り返り→目標設定","B. ビジョン・目標設定→計画立案→実施→評価・振り返り→改善・次サイクル","C. 評価→計画→目標設定→実施","D. 報告→実施→計画→改善"],"a":1,"e":"キャリア教育プロジェクトの基本的な流れは①ビジョン・目標の設定②計画立案③実施④評価・振り返り⑤改善・次サイクルというPDCAに基づく循環。"},{"c":"第16章","q":"プロジェクトにおける「ステークホルダー」とは何か。","o":["A. プロジェクトの資金提供者のみ","B. プロジェクトに利害関係を持つすべての人・組織（学校・保護者・企業・行政等）","C. プロジェクトの直接実施者のみ","D. 反対意見を持つ人々"],"a":1,"e":"ステークホルダーとはプロジェクトに利害関係を持つすべての人・組織を指す。キャリア教育では学校・生徒・保護者・地域企業・行政・NPOなど多岐にわたる。"},{"c":"第16章","q":"「試行錯誤しつつ続けていく」姿勢が重要な理由として最も適切なものはどれか。","o":["A. 完璧な計画を立てることが不可能だから諦めるしかない","B. 実践と改善を繰り返すことでキャリア教育の質が高まるから","C. 法律で試行錯誤が義務付けられているから","D. 予算が少ないため完全な実施が難しいから"],"a":1,"e":"現実の教育現場は計画通りには進まない。試行錯誤を恐れず実践し、振り返り・改善を繰り返すことがキャリア教育の質向上につながる。"},{"c":"第16章","q":"「キャリア教育プロジェクトのマネジメントを通して」得られるものとして最も適切なものはどれか。","o":["A. コーディネーターの個人的な名声","B. 学校・地域・企業等の関係者が協働し、持続可能なキャリア教育の仕組みが地域に根付くこと","C. 文部科学省からの公式認定","D. 高額な謝礼の獲得"],"a":1,"e":"プロジェクトマネジメントを通じた最終的な成果は、多様な関係者が協働する持続可能な仕組みの構築。地域の「仕組み」が育つことが重要。"},{"c":"第16章","q":"「関係者への報告・共有」がプロジェクトで重要な理由はどれか。","o":["A. 法律で義務付けられているため","B. 関係者の理解・協力を維持し、プロジェクトの透明性と信頼を確保するため","C. 批判を防ぐための自己防衛のため","D. 次回の予算確保のためだけ"],"a":1,"e":"定期的な報告・情報共有は関係者の理解と継続的な協力を得るために不可欠。透明性を高め信頼関係を維持することでプロジェクトの持続可能性が高まる。"},{"c":"第16章","q":"プロジェクトマネジメントにおける「リスク管理」の目的として最も適切なものはどれか。","o":["A. すべてのリスクをゼロにすること","B. 予測されるリスクを事前に特定し、影響を最小化する対策を講じること","C. リスクが発生してから対処すれば十分","D. リスクは担当者個人の責任で対処する"],"a":1,"e":"リスク管理はすべてのリスクをなくすことではなく、事前に想定されるリスクを特定し優先度をつけ、影響を最小化する対策を計画的に講じること。"},{"c":"第16章","q":"「プロジェクト型キャリア教育の評価」として最も重要な視点はどれか。","o":["A. プロジェクトが計画通りに実施できたかどうかのみ","B. プロジェクトを通じて子どものキャリア発達がどれだけ促されたか（成果）と、プロセスの質（過程）の両面","C. 予算を使い切ったかどうかのみ","D. 関係者の満足度のみ"],"a":1,"e":"プロジェクト型キャリア教育の評価は「計画通りの実施」という実行評価だけでなく、子どものキャリア発達への効果（成果評価）とプロセスの質の両面が重要。"},{"c":"第16章","q":"「スコープ（scope）管理」の重要性として最も適切なものはどれか。","o":["A. プロジェクトの予算を管理すること","B. プロジェクトで行うこと・行わないことの範囲を明確にし、肥大化・迷走を防ぐこと","C. 参加者の数を管理すること","D. スケジュールを管理すること"],"a":1,"e":"スコープ管理はプロジェクトで「何をするか・何をしないか」の範囲を明確にすること。範囲が曖昧だとプロジェクトが肥大化・迷走し目標達成が困難になる。"},{"c":"第16章","q":"「コミュニケーション計画」をプロジェクト開始時に作る意義はどれか。","o":["A. 会議の回数を増やすため","B. 誰に・何を・いつ・どのように伝えるかを事前に設計し、情報共有の漏れ・混乱を防ぐため","C. コミュニケーションの費用を削減するため","D. 担当者の負担を増やすため"],"a":1,"e":"コミュニケーション計画の事前策定により、関係者への情報共有の漏れ・遅延・誤解を防ぎ、プロジェクトのスムーズな進行と関係者の協力維持が図れる。"},{"c":"第16章","q":"「ステークホルダー分析」の目的として最も適切なものはどれか。","o":["A. 反対者を特定して排除する","B. 各ステークホルダーの立場・関心・影響力を把握し、適切なコミュニケーション・関与方法を設計するため","C. 費用を負担させる相手を特定する","D. プロジェクトの参加者を決定するだけ"],"a":1,"e":"ステークホルダー分析により各関係者の立場・関心・影響力・懸念事項を把握できる。これに基づき適切なコミュニケーション戦略・関与方法を設計することがプロジェクト成功の鍵。"},{"c":"第16章","q":"「プロジェクトマネジャーとしてのコーディネーター」に求められることはどれか。","o":["A. 全ての作業を一人で実施する","B. 目標達成に向けて関係者を調整・動機づけし、課題を解決しながらプロジェクトを前進させるリーダーシップ","C. 担当者に全てを任せる","D. 行政の指示だけに従う"],"a":1,"e":"PMとしてのコーディネーターは、目標達成に向けて多様な関係者を調整・動機づけし、変化・課題に対応しながらプロジェクトを推進するリーダーシップが求められる。"},{"c":"第16章","q":"「キャリア教育プロジェクトの持続可能性」を高めるために最も重要なことはどれか。","o":["A. 一人のカリスマ的コーディネーターに全てを任せる","B. 仕組み・体制・関係者の合意・記録・引継ぎを整備し、担当者が変わっても継続できる組織的基盤を作る","C. 行政から毎年大きな予算を確保する","D. 毎年全く新しいプログラムを開発する"],"a":1,"e":"持続可能性のためには特定個人への依存を避け、仕組み・体制・ノウハウの文書化・関係者の合意形成・引継ぎ体制など組織的な基盤づくりが不可欠。"},{"c":"第16章","q":"「プロジェクトの「学び（教訓）」の記録」が重要な理由はどれか。","o":["A. 担当者の責任を確定するため","B. 成功・失敗の教訓を組織の知的資産として蓄積し、次のプロジェクトの質向上に活かすため","C. 行政への義務的な報告のため","D. プロジェクト参加者を表彰するため"],"a":1,"e":"プロジェクトを通じて得た教訓（何がうまくいき・何が失敗だったか）を記録・共有することで、次のプロジェクトがより効果的になる組織学習の仕組みが生まれる。"}];
var CH=[{"n":1,"t":"我が国に求められる人材像とキャリア教育"},{"n":2,"t":"コーディネーターの業務と役割"},{"n":3,"t":"キャリア教育に関わる取り組み"},{"n":4,"t":"地域資源の理解とネットワークの構築"},{"n":5,"t":"地域・企業等の支援の現状"},{"n":6,"t":"地域の雇用や産業等の現状"},{"n":7,"t":"教育行政に関わる組織と現状"},{"n":8,"t":"学校組織と教職員の職務の現状"},{"n":9,"t":"児童・生徒等の発達の段階と現状"},{"n":10,"t":"学習指導要領"},{"n":11,"t":"キャリア教育ではぐくむ力"},{"n":12,"t":"キャリア教育の事例"},{"n":13,"t":"プログラムの開発"},{"n":14,"t":"各教科等との関わり"},{"n":15,"t":"効果測定方法の理解と活用"},{"n":16,"t":"プロジェクトマネジメント"}];
var sel=new Set(),qs=[],idx=0,sc=0,hist=[],ans=false;
function g(i){return document.getElementById(i);}
function show(id){['A','B','D'].forEach(function(s){g(s).style.display=s===id?'':'none';});}
function sf(m){var b=g('eB');b.textContent=m;b.style.display='';}
function hf(){g('eB').style.display='none';}
function shuf(a){var r=a.slice();for(var i=r.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=r[i];r[i]=r[j];r[j]=t;}return r;}

window.onload=function(){
  var grid=g('cG');
  CH.forEach(function(ch){
    var b=document.createElement('button');
    b.className='ch';
    b.innerHTML='<span class="cn">第'+ch.n+'章</span>'+ch.t;
    b.onclick=function(){
      if(sel.has(ch.n)){sel.delete(ch.n);b.className='ch';}
      else{sel.add(ch.n);b.className='ch on';}
    };
    grid.appendChild(b);
  });
  g('bA').onclick=function(){CH.forEach(function(c){sel.add(c.n);});document.querySelectorAll('.ch').forEach(function(b){b.className='ch on';});};
  g('bN').onclick=function(){sel.clear();document.querySelectorAll('.ch').forEach(function(b){b.className='ch';});};
  g('stB').onclick=start;
  g('nB').onclick=next;
  g('rtB').onclick=retry;
};

function start(){
  hf();
  if(sel.size===0){sf('章を1つ以上選択してください');return;}
  var pool=Q.filter(function(q){return sel.has(parseInt(q.c.replace('第','').replace('章','')));});
  if(!pool.length){sf('問題がありません');return;}
  var n=parseInt(g('nQ').value);
  if(g('oR').value==='random')pool=shuf(pool);
  if(n>0&&n<pool.length)pool=pool.slice(0,n);
  qs=pool;idx=0;sc=0;hist=[];ans=false;
  show('B');renderQ();
}

function renderQ(){
  ans=false;
  var q=qs[idx],tot=qs.length;
  g('pB').style.width=(idx/tot*100)+'%';
  g('cT').textContent=(idx+1)+' / '+tot;
  g('cH').textContent=q.c;
  g('qT').textContent=q.q;
  g('lS').textContent=sc;
  g('lT').textContent=idx;
  g('xB').style.display='none';
  g('nB').style.display='none';
  var w=g('oW');w.innerHTML='';
  q.o.forEach(function(opt,i){
    var b=document.createElement('button');
    b.className='opt';
    b.innerHTML='<span class="ol">'+opt[0]+'</span><span>'+opt.slice(3)+'</span>';
    b.onclick=function(){pick(i);};
    w.appendChild(b);
  });
}

function pick(i){
  if(ans)return;
  ans=true;
  var q=qs[idx],ok=(i===q.a);
  if(ok)sc++;
  hist.push({q:q,ua:i,ok:ok});
  g('oW').querySelectorAll('.opt').forEach(function(b,j){
    b.disabled=true;
    if(j===q.a)b.classList.add(j===i&&ok?'C':'R');
    if(j===i&&!ok)b.classList.add('W');
  });
  g('xT').textContent=q.e;
  g('xB').style.display='';
  g('lS').textContent=sc;
  g('lT').textContent=idx+1;
  var nb=g('nB');
  nb.textContent=idx===qs.length-1?'結果を見る':'次の問題 →';
  nb.style.display='';
}

function next(){
  idx++;
  if(idx>=qs.length){result();return;}
  renderQ();window.scrollTo(0,0);
}

function result(){
  show('D');
  var tot=qs.length,pct=Math.round(sc/tot*100);
  g('rP').textContent=pct+'%';
  g('rO').textContent=sc;
  g('rN').textContent=tot-sc;
  g('rTt').textContent=tot;
  var msg,sub;
  if(pct>=90){msg='素晴らしい！合格レベルです';sub='苦手な問題を最終確認しましょう。';}
  else if(pct>=70){msg='まずまずの結果';sub='不正解の問題を中心に見直しましょう。';}
  else if(pct>=50){msg='もう少し頑張りましょう';sub='基本用語・定義の理解がポイントです。';}
  else{msg='基礎から復習が必要です';sub='テキストを再読してから再挑戦してください。';}
  g('rM').textContent=msg;g('rS').textContent=sub;
  var list=g('rL');list.innerHTML='';
  hist.forEach(function(h,i){
    var d=document.createElement('div');
    d.className='ri '+(h.ok?'c':'w');
    var a=h.ok?'<span class="ca">✓ '+h.q.o[h.q.a]+'</span>':'<span class="wa">✗ '+h.q.o[h.ua]+'</span><span class="ca">✓ '+h.q.o[h.q.a]+'</span>';
    d.innerHTML='<div class="rq">'+(i+1)+'. '+h.q.q+'</div><div class="ra">'+a+'</div>';
    list.appendChild(d);
  });
  window.scrollTo(0,0);
}

function retry(){
  sel.clear();document.querySelectorAll('.ch').forEach(function(b){b.className='ch';});
  hf();show('A');window.scrollTo(0,0);
}
</script>
</body>
</html>
