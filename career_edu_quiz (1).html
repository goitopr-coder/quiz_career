<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>キャリア教育コーディネーター 試験対策クイズ</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0f1117;color:#e8eaf0;font-family:sans-serif;padding:0 0 60px;}
h1{font-size:15px;font-weight:700;}
.hdr{background:#1a1d27;border-bottom:1px solid #2e3347;padding:14px;text-align:center;}
.sub{font-size:11px;color:#8890a8;margin-top:2px;}
.wrap{max-width:580px;margin:0 auto;padding:14px;}
.card{background:#1a1d27;border:1px solid #2e3347;border-radius:12px;padding:14px;margin-bottom:10px;}
.lbl{font-size:11px;color:#8890a8;display:block;margin-bottom:6px;font-weight:500;}
input,select{width:100%;background:#0f1117;border:1px solid #2e3347;border-radius:8px;color:#e8eaf0;font-size:14px;font-family:sans-serif;padding:10px 12px;outline:none;-webkit-appearance:none;}
input[type=password]{letter-spacing:2px;}
.btn{display:block;width:100%;background:#4f8ef7;color:#fff;border:none;border-radius:10px;padding:14px;font-size:15px;font-weight:700;font-family:sans-serif;cursor:pointer;margin-bottom:10px;text-align:center;}
.btn.g{background:#232736;border:1px solid #2e3347;color:#e8eaf0;font-size:13px;}
.err{background:rgba(247,95,110,0.1);border:1px solid rgba(247,95,110,0.3);border-radius:8px;padding:12px;font-size:13px;color:#f75f6e;margin-bottom:10px;display:none;}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-top:6px;}
.ch{background:#232736;border:1px solid #2e3347;border-radius:8px;color:#8890a8;font-size:11px;font-family:sans-serif;padding:8px 10px;text-align:left;cursor:pointer;line-height:1.5;width:100%;}
.ch.on{background:rgba(79,142,247,0.15);border-color:#4f8ef7;color:#e8eaf0;}
.cn{font-size:10px;font-weight:700;color:#4f8ef7;display:block;}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;}
.sr{display:flex;gap:5px;margin-bottom:7px;}
.sb{flex:1;background:#232736;border:1px solid #2e3347;border-radius:6px;color:#8890a8;font-size:11px;font-family:sans-serif;padding:7px;cursor:pointer;}
.note{font-size:11px;color:#555f7a;margin-top:5px;line-height:1.6;}
/* quiz */
.pw{background:#232736;border-radius:4px;height:4px;margin-bottom:12px;}
.pb{height:4px;background:#4f8ef7;border-radius:4px;transition:width 0.3s;}
.sc{text-align:center;font-size:13px;color:#8890a8;margin-bottom:12px;}
.sc b{color:#4f8ef7;font-size:18px;}
.meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.cnt{font-size:11px;color:#8890a8;font-weight:700;}
.tag{font-size:10px;background:rgba(79,142,247,0.15);color:#4f8ef7;border:1px solid rgba(79,142,247,0.3);border-radius:20px;padding:2px 10px;}
.qtxt{font-size:15px;font-weight:600;line-height:1.7;margin-bottom:14px;}
.opt{background:#232736;border:1px solid #2e3347;border-radius:10px;padding:12px 13px;color:#e8eaf0;font-size:13px;font-family:sans-serif;cursor:pointer;text-align:left;width:100%;display:flex;gap:10px;margin-bottom:7px;line-height:1.5;}
.opt:disabled{cursor:default;}
.ol{font-weight:700;font-size:12px;color:#555f7a;min-width:16px;flex-shrink:0;padding-top:1px;}
.opt.C{background:rgba(56,211,159,0.12);border-color:#38d39f;}.opt.C .ol{color:#38d39f;}
.opt.W{background:rgba(247,95,110,0.1);border-color:#f75f6e;}.opt.W .ol{color:#f75f6e;}
.opt.R{border-color:#38d39f;}.opt.R .ol{color:#38d39f;}
.expl{background:rgba(240,180,41,0.07);border:1px solid rgba(240,180,41,0.25);border-radius:10px;padding:13px;margin-top:11px;}
.et{font-size:11px;font-weight:700;color:#f0b429;margin-bottom:5px;}
.eb{font-size:13px;line-height:1.7;color:#a0a8c0;}
.loading{text-align:center;padding:30px;color:#8890a8;font-size:14px;}
/* result */
.rp{font-size:52px;font-weight:700;color:#4f8ef7;text-align:center;line-height:1;margin:6px 0 4px;}
.rl{font-size:12px;color:#8890a8;text-align:center;margin-bottom:14px;}
.rm{font-size:16px;font-weight:700;text-align:center;margin-bottom:5px;}
.rs{font-size:13px;color:#8890a8;text-align:center;margin-bottom:18px;}
.st{display:flex;justify-content:center;gap:24px;margin-bottom:18px;}
.sn{font-size:26px;font-weight:700;text-align:center;}
.sn.g{color:#38d39f;}.sn.r{color:#f75f6e;}
.sl{font-size:11px;color:#8890a8;text-align:center;}
.rt{font-size:11px;font-weight:700;color:#8890a8;letter-spacing:0.1em;margin:14px 0 8px;}
.ri{background:#0f1117;border-radius:8px;padding:10px 12px;margin-bottom:6px;border-left:3px solid #2e3347;}
.ri.c{border-left-color:#38d39f;}.ri.w{border-left-color:#f75f6e;}
.rq{font-size:13px;margin-bottom:4px;line-height:1.5;}
.ra{font-size:11px;color:#8890a8;}
.ca{color:#38d39f;margin-right:8px;}.wa{color:#f75f6e;margin-right:8px;}
#S{}#Q{display:none;}#R{display:none;}
</style>
</head>
<body>
<div class="hdr">
  <h1>キャリア教育コーディネーター 試験対策クイズ</h1>
  <p class="sub">AI問題生成・全16章対応</p>
</div>
<div class="wrap">

<!-- Setup -->
<div id="S">
  <div class="card">
    <span class="lbl">Anthropic APIキー</span>
    <input type="password" id="apiKey" placeholder="sk-ant-api03-..." autocomplete="off" spellcheck="false">
    <p class="note">※ キーはAPIリクエストにのみ使用。保存・送信はしません。</p>
  </div>
  <div class="card">
    <span class="lbl">章を選択（複数可）</span>
    <div class="sr">
      <button class="sb" id="bA">すべて選択</button>
      <button class="sb" id="bN">すべて解除</button>
    </div>
    <div class="grid" id="cG"></div>
  </div>
  <div class="row2">
    <div class="card">
      <span class="lbl">問題数</span>
      <select id="nQ">
        <option value="5">5問</option>
        <option value="10" selected>10問</option>
        <option value="20">20問</option>
      </select>
    </div>
    <div class="card">
      <span class="lbl">難易度</span>
      <select id="dif">
        <option value="基礎">基礎</option>
        <option value="標準" selected>標準</option>
        <option value="応用">応用</option>
      </select>
    </div>
  </div>
  <div class="err" id="eB"></div>
  <button class="btn" id="stB">問題を生成してクイズ開始</button>
</div>

<!-- Quiz -->
<div id="Q">
  <div class="pw"><div class="pb" id="pB" style="width:0%"></div></div>
  <div class="sc">スコア: <b id="lS">0</b> / <span id="lT">0</span></div>
  <div class="card" id="qCard">
    <div class="loading" id="loadMsg">AIが問題を生成中<span id="dots">...</span></div>
  </div>
  <button class="btn" id="nB" style="display:none">次の問題 →</button>
</div>

<!-- Result -->
<div id="R">
  <div class="card">
    <div class="rp" id="rP"></div>
    <div class="rl">正答率</div>
    <div class="rm" id="rM"></div>
    <div class="rs" id="rS"></div>
    <div class="st">
      <div><div class="sn g" id="rO"></div><div class="sl">正解</div></div>
      <div><div class="sn r" id="rN"></div><div class="sl">不正解</div></div>
      <div><div class="sn" style="color:#8890a8" id="rTt"></div><div class="sl">合計</div></div>
    </div>
    <button class="btn g" id="rtB">もう一度</button>
    <div class="rt">全問振り返り</div>
    <div id="rL"></div>
  </div>
</div>

</div>
<script>
var CH=[{"n":1,"t":"我が国に求められる人材像とキャリア教育"},{"n":2,"t":"コーディネーターの業務と役割"},{"n":3,"t":"キャリア教育に関わる取り組み"},{"n":4,"t":"地域資源の理解とネットワークの構築"},{"n":5,"t":"地域・企業等の支援の現状"},{"n":6,"t":"地域の雇用や産業等の現状"},{"n":7,"t":"教育行政に関わる組織と現状"},{"n":8,"t":"学校組織と教職員の職務の現状"},{"n":9,"t":"児童・生徒等の発達の段階と現状"},{"n":10,"t":"学習指導要領"},{"n":11,"t":"キャリア教育ではぐくむ力"},{"n":12,"t":"キャリア教育の事例"},{"n":13,"t":"プログラムの開発"},{"n":14,"t":"各教科等との関わり"},{"n":15,"t":"効果測定方法の理解と活用"},{"n":16,"t":"プロジェクトマネジメント"}];
var sel=new Set(),qs=[],idx=0,sc=0,hist=[],total=10;
var dotT=null;

function g(i){return document.getElementById(i);}
function show(id){['S','Q','R'].forEach(function(s){g(s).style.display=s===id?'':'none';});}
function sf(m){var b=g('eB');b.textContent=m;b.style.display='';}
function hf(){g('eB').style.display='none';}

window.onload=function(){
  var grid=g('cG');
  CH.forEach(function(ch){
    var b=document.createElement('button');
    b.className='ch';
    b.innerHTML='<span class="cn">第'+ch.n+'章</span>'+ch.t;
    b.onclick=function(){
      if(sel.has(ch.n)){sel.delete(ch.n);b.className='ch';}
      else{sel.add(ch.n);b.className='ch on';}
    };
    grid.appendChild(b);
  });
  g('bA').onclick=function(){CH.forEach(function(c){sel.add(c.n);});document.querySelectorAll('.ch').forEach(function(b){b.className='ch on';});};
  g('bN').onclick=function(){sel.clear();document.querySelectorAll('.ch').forEach(function(b){b.className='ch';});};
  g('stB').onclick=startQuiz;
  g('nB').onclick=nextQ;
  g('rtB').onclick=retry;
};

function startQuiz(){
  hf();
  var key=g('apiKey').value.trim();
  if(!key){sf('APIキーを入力してください');return;}
  if(sel.size===0){sf('章を1つ以上選択してください');return;}
  total=parseInt(g('nQ').value);
  qs=[];idx=0;sc=0;hist=[];
  show('Q');
  loadQuestion();
}

function getChNames(){
  var names=[];
  CH.forEach(function(ch){if(sel.has(ch.n))names.push('第'+ch.n+'章「'+ch.t+'」');});
  return names;
}

function randChapter(){
  var arr=[];
  CH.forEach(function(ch){if(sel.has(ch.n))arr.push(ch);});
  return arr[Math.floor(Math.random()*arr.length)];
}

function startDots(){
  var d=g('dots'),i=0;
  dotT=setInterval(function(){d.textContent=['...','・・・','…'][i%3];i++;},400);
}
function stopDots(){if(dotT){clearInterval(dotT);dotT=null;}}

function loadQuestion(){
  g('pB').style.width=(idx/total*100)+'%';
  g('lT').textContent=idx;
  g('nB').style.display='none';
  var card=g('qCard');
  card.innerHTML='<div class="loading" id="loadMsg">AIが問題を生成中<span id="dots">...</span></div>';
  startDots();

  var ch=randChapter();
  var dif=g('dif').value;
  var prompt='キャリア教育コーディネーター育成研修の試験対策として、'+ch.t+'（'+ch.n+'章）に関する'+dif+'レベルの四択問題を1問作成してください。

以下のJSON形式のみで返答してください（他のテキスト不要）：
{"q":"問題文","o":["A. 選択肢1","B. 選択肢2","C. 選択肢3","D. 選択肢4"],"a":正解インデックス(0-3),"e":"解説文","c":"'+ch.n+'章"}';

  fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{
      'Content-Type':'application/json',
      'x-api-key':g('apiKey').value.trim(),
      'anthropic-version':'2023-06-01',
      'anthropic-dangerous-direct-browser-access':'true'
    },
    body:JSON.stringify({
      model:'claude-haiku-4-5-20251001',
      max_tokens:600,
      messages:[{role:'user',content:prompt}]
    })
  })
  .then(function(r){return r.json();})
  .then(function(data){
    stopDots();
    if(data.error){sf('APIエラー: '+data.error.message);show('S');return;}
    var text=data.content[0].text.trim();
    text=text.replace(/```json/g,'').replace(/```/g,'').trim();
    var q=JSON.parse(text);
    q.c=ch.n+'章';
    qs.push(q);
    renderQ(q);
  })
  .catch(function(e){
    stopDots();
    sf('エラーが発生しました: '+e.message);
    show('S');
  });
}

function renderQ(q){
  var card=g('qCard');
  card.innerHTML='';
  var meta=document.createElement('div');
  meta.className='meta';
  meta.innerHTML='<span class="cnt">'+(idx+1)+' / '+total+'</span><span class="tag">第'+q.c+'</span>';
  card.appendChild(meta);
  var qt=document.createElement('div');
  qt.className='qtxt';
  qt.textContent=q.q;
  card.appendChild(qt);
  q.o.forEach(function(opt,i){
    var b=document.createElement('button');
    b.className='opt';
    b.innerHTML='<span class="ol">'+opt[0]+'</span><span>'+opt.slice(3)+'</span>';
    b.onclick=function(){pick(i,q,card);};
    card.appendChild(b);
  });
}

function pick(i,q,card){
  var ok=(i===q.a);
  if(ok)sc++;
  hist.push({q:q,ua:i,ok:ok});
  card.querySelectorAll('.opt').forEach(function(b,j){
    b.disabled=true;
    if(j===q.a)b.classList.add(j===i&&ok?'C':'R');
    if(j===i&&!ok)b.classList.add('W');
  });
  var ex=document.createElement('div');
  ex.className='expl';
  ex.innerHTML='<div class="et">解説</div><div class="eb">'+q.e+'</div>';
  card.appendChild(ex);
  g('lS').textContent=sc;
  g('lT').textContent=idx+1;
  var nb=g('nB');
  nb.textContent=idx+1>=total?'結果を見る':'次の問題 →';
  nb.style.display='';
}

function nextQ(){
  idx++;
  if(idx>=total){showResult();return;}
  loadQuestion();
  window.scrollTo(0,0);
}

function showResult(){
  show('R');
  var pct=Math.round(sc/total*100);
  g('rP').textContent=pct+'%';
  g('rO').textContent=sc;
  g('rN').textContent=total-sc;
  g('rTt').textContent=total;
  var msg,sub;
  if(pct>=90){msg='素晴らしい！合格レベルです';sub='苦手な問題を最終確認しましょう。';}
  else if(pct>=70){msg='まずまずの結果';sub='不正解の問題を中心に見直しましょう。';}
  else if(pct>=50){msg='もう少し頑張りましょう';sub='基本用語・定義の理解がポイントです。';}
  else{msg='基礎から復習が必要です';sub='テキストを再読してから再挑戦してください。';}
  g('rM').textContent=msg;g('rS').textContent=sub;
  var list=g('rL');list.innerHTML='';
  hist.forEach(function(h,i){
    var d=document.createElement('div');
    d.className='ri '+(h.ok?'c':'w');
    var a=h.ok?'<span class="ca">✓ '+h.q.o[h.q.a]+'</span>':'<span class="wa">✗ '+h.q.o[h.ua]+'</span><span class="ca">✓ '+h.q.o[h.q.a]+'</span>';
    d.innerHTML='<div class="rq">'+(i+1)+'. '+h.q.q+'</div><div class="ra">'+a+'</div>';
    list.appendChild(d);
  });
  window.scrollTo(0,0);
}

function retry(){
  qs=[];idx=0;sc=0;hist=[];
  sel.clear();
  document.querySelectorAll('.ch').forEach(function(b){b.className='ch';});
  hf();show('S');window.scrollTo(0,0);
}
</script>
</body>
</html>
